## Local validation: spins up all reference API servers for JSON endpoint testing.
## Usage:
##   cd benchmarks/validate
##   ./run-validation.sh
##
## Each language gets a unique port (8501-8516) so all can run simultaneously.
##
## Every service mounts the shared dataset (benchmarks/shared/API-SPEC.md §2) —
## previously only certs were mounted, so validation never exercised the
## dataset code paths that break in production (audit V6/F2).

x-bench-data: &bench-data ../reference-apis/shared/bench-data.json:/opt/bench/bench-data.json:ro

services:
  certs:
    image: alpine/openssl
    command: >
      req -x509 -newkey rsa:2048
        -keyout /certs/key.pem -out /certs/cert.pem
        -days 1 -nodes -subj '/CN=bench'
    volumes:
      - certs:/certs

  go:
    build: ../reference-apis/go
    ports: ["8501:8443"]
    environment:
      BENCH_CERT_DIR: /opt/bench
      BENCH_DATA_PATH: /opt/bench/bench-data.json
    volumes:
      - certs:/opt/bench:ro
      - *bench-data
    depends_on:
      certs:
        condition: service_completed_successfully

  python:
    build: ../reference-apis/python
    ports: ["8502:8443"]
    environment:
      BENCH_CERT_DIR: /opt/bench
      BENCH_DATA_PATH: /opt/bench/bench-data.json
    volumes:
      - certs:/opt/bench:ro
      - *bench-data
    depends_on:
      certs:
        condition: service_completed_successfully

  nodejs:
    build: ../reference-apis/nodejs
    ports: ["8503:8443"]
    environment:
      BENCH_CERT_DIR: /opt/bench
      BENCH_PORT: "8443"
      BENCH_DATA_PATH: /opt/bench/bench-data.json
    volumes:
      - certs:/opt/bench:ro
      - *bench-data
    depends_on:
      certs:
        condition: service_completed_successfully

  java:
    build: ../reference-apis/java
    ports: ["8504:8443"]
    environment:
      BENCH_CERT_DIR: /opt/bench
      BENCH_DATA_PATH: /opt/bench/bench-data.json
    volumes:
      - certs:/opt/bench:ro
      - *bench-data
    depends_on:
      certs:
        condition: service_completed_successfully

  ruby:
    build: ../reference-apis/ruby
    ports: ["8505:8443"]
    environment:
      BENCH_CERT_DIR: /opt/bench
      BENCH_PORT: "8443"
      BENCH_DATA_PATH: /opt/bench/bench-data.json
    volumes:
      - certs:/opt/bench:ro
      - *bench-data
    depends_on:
      certs:
        condition: service_completed_successfully

  php:
    build: ../reference-apis/php
    ports: ["8506:8443"]
    environment:
      BENCH_CERT_DIR: /opt/bench
      BENCH_DATA_PATH: /opt/bench/bench-data.json
    volumes:
      - certs:/opt/bench:ro
      - *bench-data
    depends_on:
      certs:
        condition: service_completed_successfully

  cpp:
    build: ../reference-apis/cpp
    ports: ["8507:8443"]
    environment:
      BENCH_CERT_DIR: /opt/bench
      BENCH_DATA_PATH: /opt/bench/bench-data.json
    volumes:
      - certs:/opt/bench:ro
      - *bench-data
    depends_on:
      certs:
        condition: service_completed_successfully

  csharp-net8:
    build: ../reference-apis/csharp-net8
    ports: ["8508:8443"]
    environment:
      BENCH_CERT_DIR: /opt/bench
      BENCH_DATA_PATH: /opt/bench/bench-data.json
    volumes:
      - certs:/opt/bench:ro
      - *bench-data
    depends_on:
      certs:
        condition: service_completed_successfully

volumes:
  certs:

# nginx.conf — benchmark static-server baseline (API-SPEC.md transport subset)
#
# nginx participates in the suite as the infrastructure baseline: pure network
# stack + kernel sendfile, zero application code. Per
# benchmarks/shared/API-SPEC.md §9 it serves ONLY the transport endpoints
# (/health, /download/{size}, /upload). The /api/* compute workloads are
# intentionally NOT implemented and answer 501 JSON — the capability matrix
# excludes nginx from apibench rankings (audit C5). See README.md for the
# full capability profile.
#
# Deployment paths that consume this file VERBATIM (no env templating):
#   - benchmarks/orchestrator (deployer.rs, "nginx" branch)
#   - install.sh --benchmark-server nginx (full-stack mode)
# Both install nginx mainline (1.25+) from nginx.org, so `http2 on` and the
# QUIC listener below are always available. BENCH_WORKERS / BENCH_PORT /
# BENCH_CERT_DIR / BENCH_API_TOKEN (API-SPEC.md §1, §3) are applied by
# deploy.sh and the Docker entrypoint via line edits of this file.

worker_processes auto;  # BENCH_WORKERS (§3) — deploy.sh/entrypoint substitutes; auto = all cores
error_log /var/log/nginx/error.log warn;
pid       /run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout   65;
    types_hash_max_size 2048;

    # Disable access log for benchmark (avoid per-request I/O noise — audit F11)
    access_log off;

    # POST /upload: received_bytes echoes Content-Length (§5.3). nginx has no
    # application code to count drained bytes, so chunked uploads report 0.
    map $content_length $bench_upload_bytes {
        ""      0;
        default $content_length;
    }

    # Bearer-token auth (§1). Disabled by default: without a generated
    # bench-auth-token.conf the map matches nothing and $bench_auth_bad is
    # always 0. When BENCH_API_TOKEN is set, deploy.sh / the Docker entrypoint
    # write /etc/nginx/bench-auth-token.conf containing:
    #     "Bearer <token>" 0;
    #     ~^ 1;
    # (exact match wins over the catch-all regex, so only the valid token
    # passes; /health carries no auth check and stays exempt).
    map $http_authorization $bench_auth_bad {
        default 0;
        include bench-auth-token[.]conf;
    }

    server {
        listen 8443 ssl;
        http2 on;

        # HTTP/3 (QUIC) — requires nginx mainline 1.25+; both production
        # deploy paths install mainline from nginx.org.
        listen 8443 quic reuseport;

        server_name _;

        ssl_certificate     /opt/bench/cert.pem;  # BENCH_CERT_DIR default (§1)
        ssl_certificate_key /opt/bench/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Advertise HTTP/3 to clients (inherited by locations that declare no
        # add_header of their own; repeated where needed below because nginx
        # add_header inheritance is all-or-nothing per location).
        add_header Alt-Svc 'h3=":8443"; ma=86400' always;

        # JSON error bodies everywhere — §1: no HTML error pages.
        error_page 400 = @e400;
        error_page 401 = @e401;
        error_page 403 = @e403;
        error_page 404 = @e404;
        error_page 405 = @e405;
        error_page 500 502 503 504 = @e500;

        location @e400 { default_type application/json; return 400 '{"error":"bad request"}'; }
        location @e401 { default_type application/json; return 401 '{"error":"unauthorized"}'; }
        location @e403 { default_type application/json; return 403 '{"error":"forbidden"}'; }
        location @e404 { default_type application/json; return 404 '{"error":"not found"}'; }
        location @e405 { default_type application/json; return 405 '{"error":"method not allowed"}'; }
        location @e500 { default_type application/json; return 500 '{"error":"internal error"}'; }

        # ── GET /health (§5.1) — constant-work, auth-exempt ─────────────────
        # $nginx_version is fixed for the process lifetime, so the body is
        # byte-constant across requests as the spec requires.
        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","runtime":"nginx","version":"$nginx_version"}';
        }

        # ── GET /download/{size} (§5.2) ──────────────────────────────────────
        # Pre-generated 0x42-filled files under /opt/bench/download/, named by
        # byte count (generate-download-files.sh). URI /download/1024 maps to
        # /opt/bench/download/1024 via root. Sizes that are not pre-generated
        # return 404 JSON (static baseline limitation, see README).
        location ~ "^/download/(?<bench_dl_size>\d+)$" {
            if ($bench_auth_bad) { return 401; }
            root /opt/bench;
            default_type application/octet-stream;
            add_header X-Download-Bytes $bench_dl_size         always;
            add_header Server-Timing    "proc;dur=0.0"         always;
            add_header Alt-Svc          'h3=":8443"; ma=86400' always;
            try_files $uri =404;
        }
        # Non-integer {size} → 400 (§5.2)
        location ~ ^/download/ {
            if ($bench_auth_bad) { return 401; }
            return 400;
        }

        # ── POST /upload (§5.3) ──────────────────────────────────────────────
        # `return` responds immediately; nginx then drains the request body at
        # line rate (lingering close). lingering_* are raised so multi-GiB
        # uploads are fully consumed. received_bytes echoes Content-Length.
        location = /upload {
            if ($bench_auth_bad)         { return 401; }
            if ($request_method != POST) { return 405; }
            client_max_body_size 0;
            lingering_close   always;
            lingering_time    600s;
            lingering_timeout 60s;
            default_type application/json;
            add_header X-Networker-Received-Bytes $bench_upload_bytes          always;
            add_header X-Networker-Request-Id     $http_x_networker_request_id always;
            add_header Server-Timing              "recv;dur=0.0"               always;
            add_header Alt-Svc                    'h3=":8443"; ma=86400'       always;
            return 200 '{"received_bytes":$bench_upload_bytes}';
        }

        # ── /api/* — NOT implemented (§9: nginx is transport-only) ───────────
        # Explicit 501 JSON with the §1 benchmark headers so validators and
        # runners get a machine-readable capability signal instead of an HTML
        # 404. nginx must be excluded from apibench mode (audit C5).
        location /api/ {
            if ($bench_auth_bad) { return 401; }
            default_type application/json;
            add_header Server-Timing               "app;dur=0.0"                         always;
            add_header Cache-Control               "no-store, no-cache, must-revalidate" always;
            add_header Timing-Allow-Origin         "*"                                   always;
            add_header Access-Control-Allow-Origin "*"                                   always;
            add_header Alt-Svc                     'h3=":8443"; ma=86400'                always;
            return 501 '{"error":"not implemented: nginx static baseline serves transport endpoints only (/health, /download/{size}, /upload) — see API-SPEC.md section 9"}';
        }

        # Everything else → JSON 404 (landing page is optional per §6)
        location / {
            return 404;
        }
    }
}

# nginx.conf — AletheBench static-file baseline
#
# This configuration mirrors the /health, /download/{size}, and /upload
# endpoints implemented by the application-level reference APIs, but serves
# everything from static files or trivial nginx directives.  It represents
# the theoretical maximum: pure network stack + kernel sendfile, zero
# application code.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Disable access log for benchmark (avoid I/O noise)
    access_log off;

    # ── TLS on port 8443, HTTP/1.1 + HTTP/2 + HTTP/3 ────────────────────
    server {
        listen 8443 ssl;
        http2 on;

        # HTTP/3 (QUIC) — requires nginx 1.25+ built with quic module
        listen 8443 quic reuseport;

        server_name _;

        ssl_certificate     /opt/bench/cert.pem;
        ssl_certificate_key /opt/bench/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Advertise HTTP/3 support to clients
        add_header Alt-Svc 'h3=":8443"; ma=86400' always;

        # ── GET /health ──────────────────────────────────────────────────
        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","runtime":"nginx","version":"latest"}';
        }

        # ── GET /download/{size} ─────────────────────────────────────────
        # Serve pre-generated files from /opt/bench/download/.
        # Files are named by byte count: 1024, 8192, 65536, 1048576, etc.
        location ~ ^/download/(\d+)$ {
            alias /opt/bench/download/$1;
            default_type application/octet-stream;
            add_header Content-Type application/octet-stream always;
        }

        # ── POST /upload ─────────────────────────────────────────────────
        # Accept the request body (up to 64 MB), discard it, return fixed
        # JSON.  client_max_body_size limits the accepted payload.
        location = /upload {
            limit_except POST { deny all; }

            client_max_body_size    64m;
            client_body_temp_path   /tmp/nginx_uploads;
            client_body_in_file_only off;

            # Return a static response after consuming the body.
            # nginx reads the full body before executing return.
            return 200 '{"bytes_received":"unknown"}';
            default_type application/json;
        }
    }
}

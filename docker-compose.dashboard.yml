version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: networker_dashboard
      POSTGRES_USER: networker
      POSTGRES_PASSWORD: networker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U networker -d networker_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

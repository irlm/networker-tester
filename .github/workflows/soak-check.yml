name: Prod soak check

# Nightly production health check — the durable automation for the
# decommission soak (docs/phase2-cutover-runbook.md §4 checklist / §7
# criteria). Started 2026-07-16 after the full C# cutover; target: 14
# consecutive green runs before the retired Rust crates are deleted from
# main. Kept running after the soak as a plain nightly prod healthcheck.
#
# A red run = a soak-day failure: GitHub notifies watchers, and the job
# summary carries the failing item. The Actions history of this workflow IS
# the soak log — count consecutive greens.
#
# Auth: azure/login (AZURE_CREDENTIALS, same as the deploy) + az vm
# run-command for on-VM checks; DASHBOARD_ADMIN_PASSWORD mints a JWT on the
# VM via localhost login for the authenticated loop-health endpoint.

on:
  schedule:
    - cron: '47 6 * * *'   # daily 06:47 UTC (off-minute, fleet-kind)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  soak:
    name: Soak checklist
    runs-on: ubuntu-latest
    steps:
      - name: Public health (200)
        run: |
          CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 https://alethedash.com/api/health)
          echo "public /api/health → $CODE" | tee -a "$GITHUB_STEP_SUMMARY"
          [ "$CODE" = "200" ]

      - name: Azure Login
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: On-VM checklist (loops, stuck runs, Rust writers, locks, outcomes)
        env:
          ADMIN_PW: ${{ secrets.DASHBOARD_ADMIN_PASSWORD }}
        run: |
          RESULT=$(az vm run-command invoke \
            --resource-group ALETHEDASH-RG \
            --name alethedash-vm \
            --command-id RunShellScript \
            --scripts "
              set -e
              FAIL=0

              # 1. background loops all_healthy (authenticated via localhost login)
              TOKEN=\$(curl -sf --max-time 8 http://127.0.0.1:5030/api/auth/login \
                -H 'Content-Type: application/json' \
                -d '{\"email\":\"admin@alethedash.com\",\"password\":\"${ADMIN_PW}\"}' \
                | python3 -c 'import sys,json;print(json.load(sys.stdin)[\"token\"])')
              HB=\$(curl -s --max-time 8 -H \"Authorization: Bearer \$TOKEN\" http://127.0.0.1:5030/api/health/background)
              echo \"\$HB\" | python3 -c '
          import sys, json
          d = json.load(sys.stdin)
          ok = d.get(\"all_healthy\", False)
          print(f\"loops all_healthy={ok} services={len(d.get(\\\"services\\\",[]))}\")
          for s in d.get(\"services\", []):
              if not s.get(\"healthy\") or s.get(\"last_error\"):
                  print(f\"  PROBLEM: {s[\\\"name\\\"]} healthy={s.get(\\\"healthy\\\")} err={s.get(\\\"last_error\\\")}\")
          raise SystemExit(0 if ok else 1)' || FAIL=1

              # 2. stuck-queued runs (must be 0)
              STUCK=\$(sudo -u postgres psql alethedash_core -tAc \"SELECT count(*) FROM test_run WHERE status='queued' AND created_at < now() - interval '5 minutes';\")
              echo \"stuck_queued=\$STUCK\"
              [ \"\$STUCK\" = \"0\" ] || FAIL=1

              # 3. no Rust writers
              RUST_DASH=\$(systemctl is-active networker-dashboard || true)
              RUST_AGENT=\$(systemctl is-active networker-agent || true)
              echo \"rust_dashboard=\$RUST_DASH rust_agent=\$RUST_AGENT\"
              [ \"\$RUST_DASH\" = \"inactive\" ] || FAIL=1
              [ \"\$RUST_AGENT\" = \"inactive\" ] || FAIL=1

              # 4. lingering advisory locks (transient 1 is fine mid-tick; >2 suspicious)
              LOCKS=\$(sudo -u postgres psql alethedash_core -tAc \"SELECT count(*) FROM pg_locks WHERE locktype='advisory' AND granted;\")
              echo \"advisory_locks=\$LOCKS\"
              [ \"\$LOCKS\" -le 2 ] || FAIL=1

              # 5. run outcomes (informational)
              echo 'run outcomes last 24h:'
              sudo -u postgres psql alethedash_core -tAc \"SELECT status || '=' || count(*) FROM test_run WHERE created_at > now() - interval '24 hours' GROUP BY status;\" || true

              [ \"\$FAIL\" = \"0\" ] && echo 'SOAK_VM_PASS' || echo 'SOAK_VM_FAIL'
            " \
            --query "value[0].message" -o tsv)
          echo "$RESULT"
          {
            echo '### On-VM checklist'
            echo '```'
            echo "$RESULT" | grep -vE '^\[stdout\]|^\[stderr\]|^Enable succeeded' | head -20
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "$RESULT" | grep -q 'SOAK_VM_PASS'

      - name: Orphan-resource count (reaper regression guard)
        run: |
          # 3 live testers × 5 resources = 15 baseline. Growth = orphans
          # accumulating (reaper regression); shrink = testers deleted (fine).
          N=$(az resource list -g ALETHEDASH-RG --query "[?starts_with(name,'tester-')] | length(@)" -o tsv)
          echo "tester-* resources: $N (baseline 15)" | tee -a "$GITHUB_STEP_SUMMARY"
          [ "$N" -le 20 ] || { echo "::error::orphan growth: $N tester resources (baseline 15) — check the orphan reaper"; exit 1; }

      - name: Verdict
        run: |
          echo '✅ Soak day PASS — count consecutive greens in this workflow'\''s run history; 14 = decommission-ready (runbook §7).' >> "$GITHUB_STEP_SUMMARY"

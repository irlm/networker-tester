name: Prod soak check

# Nightly production health check — the durable automation for the
# decommission soak (docs/phase2-cutover-runbook.md §4 checklist / §7
# criteria). Started 2026-07-16 after the full C# cutover; target: 14
# consecutive green runs before the retired Rust crates are deleted from
# main. Kept running after the soak as a plain nightly prod healthcheck.
#
# A red run = a soak-day failure: GitHub notifies watchers, and the job
# summary carries the failing item. The Actions history of this workflow IS
# the soak log — count consecutive greens.
#
# Auth: azure/login (AZURE_CREDENTIALS, same as the deploy) + az vm
# run-command for on-VM checks; DASHBOARD_ADMIN_PASSWORD mints a JWT on the
# VM via localhost login for the authenticated loop-health endpoint.

on:
  schedule:
    - cron: '47 6 * * *'   # daily 06:47 UTC (off-minute, fleet-kind)
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read   # streak step reads this workflow's own run history
  issues: write   # failure alerting creates/comments the pinned issue

jobs:
  soak:
    name: Soak checklist
    runs-on: ubuntu-latest
    steps:
      - name: Public health (200)
        run: |
          CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 https://laghound.com/api/health)
          echo "public /api/health (laghound.com) → $CODE" | tee -a "$GITHUB_STEP_SUMMARY"
          [ "$CODE" = "200" ]

      # Fielded agents still hold provision-time alethedash.com WS URLs; the
      # bridge must answer 200 until its decommission window closes
      # (docs/branding.md domain bridge policy). This alerts if it dies early.
      - name: Bridge health — alethedash.com still 200
        run: |
          CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 https://laghound.com/api/health)
          echo "bridge /api/health (alethedash.com) → $CODE" | tee -a "$GITHUB_STEP_SUMMARY"
          [ "$CODE" = "200" ]

      - name: Azure Login
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: On-VM checklist (loops, stuck runs, Rust writers, locks, outcomes)
        env:
          ADMIN_PW: ${{ secrets.DASHBOARD_ADMIN_PASSWORD }}
        run: |
          RESULT=$(az vm run-command invoke \
            --resource-group ALETHEDASH-RG \
            --name alethedash-vm \
            --command-id RunShellScript \
            --scripts "
              set -e
              FAIL=0

              # 1. background loops all_healthy (authenticated via localhost login)
              TOKEN=\$(curl -sf --max-time 8 http://127.0.0.1:5030/api/auth/login \
                -H 'Content-Type: application/json' \
                -d '{\"email\":\"admin@alethedash.com\",\"password\":\"${ADMIN_PW}\"}' \
                | python3 -c 'import sys,json;print(json.load(sys.stdin)[\"token\"])')
              HB=\$(curl -s --max-time 8 -H \"Authorization: Bearer \$TOKEN\" http://127.0.0.1:5030/api/health/background)
              # Quoting-proof check (no inline python — it does not survive the
              # YAML->bash->az->bash nesting): System.Text.Json emits compact
              # JSON, so the healthy verdict is a fixed substring.
              echo \"loops: \$(echo \"\$HB\" | head -c 300)\"
              echo \"\$HB\" | grep -q '\"all_healthy\":true' || { echo 'loops NOT all_healthy'; FAIL=1; }

              # 2. stuck-queued runs (must be 0)
              STUCK=\$(sudo -u postgres psql alethedash_core -tAc \"SELECT count(*) FROM test_run WHERE status='queued' AND created_at < now() - interval '5 minutes';\")
              echo \"stuck_queued=\$STUCK\"
              [ \"\$STUCK\" = \"0\" ] || FAIL=1

              # 3. no Rust writers
              RUST_DASH=\$(systemctl is-active networker-dashboard || true)
              RUST_AGENT=\$(systemctl is-active networker-agent || true)
              echo \"rust_dashboard=\$RUST_DASH rust_agent=\$RUST_AGENT\"
              [ \"\$RUST_DASH\" = \"inactive\" ] || FAIL=1
              [ \"\$RUST_AGENT\" = \"inactive\" ] || FAIL=1

              # 4. lingering advisory locks (transient 1 is fine mid-tick; >2 suspicious)
              LOCKS=\$(sudo -u postgres psql alethedash_core -tAc \"SELECT count(*) FROM pg_locks WHERE locktype='advisory' AND granted;\")
              echo \"advisory_locks=\$LOCKS\"
              [ \"\$LOCKS\" -le 2 ] || FAIL=1

              # 5. run outcomes (informational)
              echo 'run outcomes last 24h:'
              sudo -u postgres psql alethedash_core -tAc \"SELECT status || '=' || count(*) FROM test_run WHERE created_at > now() - interval '24 hours' GROUP BY status;\" || true

              [ \"\$FAIL\" = \"0\" ] && echo 'SOAK_VM_PASS' || echo 'SOAK_VM_FAIL'
            " \
            --query "value[0].message" -o tsv)
          echo "$RESULT"
          {
            echo '### On-VM checklist'
            echo '```'
            echo "$RESULT" | grep -vE '^\[stdout\]|^\[stderr\]|^Enable succeeded' | head -20
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "$RESULT" | grep -q 'SOAK_VM_PASS'

      - name: Orphan-resource count (reaper regression guard)
        run: |
          # 3 live testers × 5 resources = 15 baseline. Growth = orphans
          # accumulating (reaper regression); shrink = testers deleted (fine).
          N=$(az resource list -g ALETHEDASH-RG --query "[?starts_with(name,'tester-')] | length(@)" -o tsv)
          echo "tester-* resources: $N (baseline 15)" | tee -a "$GITHUB_STEP_SUMMARY"
          [ "$N" -le 20 ] || { echo "::error::orphan growth: $N tester resources (baseline 15) — check the orphan reaper"; exit 1; }

      - name: Verdict
        run: |
          echo '✅ Soak day PASS — count consecutive greens in this workflow'\''s run history; 14 = decommission-ready (runbook §7).' >> "$GITHUB_STEP_SUMMARY"

      # ── Streak counter ──────────────────────────────────────────────────
      # Accounting note: this workflow's run history was reset ~2026-07-17 by
      # the required-check refactor, so the streak counts from the most recent
      # red OR the start of the visible history, whichever comes first —
      # exactly what walking newest→oldest until a failure gives us.
      # Cancelled/skipped runs are neither green nor red and are ignored.
      - name: Consecutive-green streak
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CONCLUSIONS=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/soak-check.yml/runs?status=completed&per_page=100" \
            --jq "[.workflow_runs[] | select(.id != ${GITHUB_RUN_ID}) | .conclusion] | join(\" \")")
          STREAK=0
          for C in $CONCLUSIONS; do
            if [ "$C" = "success" ]; then
              STREAK=$((STREAK+1))
            elif [ "$C" = "cancelled" ] || [ "$C" = "skipped" ]; then
              continue
            else
              break
            fi
          done
          echo "Consecutive green soak runs BEFORE this one: ${STREAK} (target 14, runbook §7)" \
            | tee -a "$GITHUB_STEP_SUMMARY"

      # ── Failure alerting ────────────────────────────────────────────────
      # A red Actions run only notifies watchers; a pinned issue is visible to
      # everyone. Create-or-comment keyed on the exact title; steps that
      # already completed report their conclusion mid-run, so we can name the
      # failing step(s) — fall back to the run log if the API answers early.
      - name: Alert — open/update pinned issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TITLE='Soak check failing'
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          FAILED=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs" \
            --jq '[.jobs[].steps[]? | select(.conclusion=="failure") | .name] | join(", ")' || true)
          [ -n "$FAILED" ] || FAILED='(see run log)'
          {
            echo "Nightly prod soak check failed."
            echo ""
            echo "- Run: ${RUN_URL}"
            echo "- Failing step(s): ${FAILED}"
            echo ""
            echo "Checklist + rollback: docs/phase2-cutover-runbook.md §4/§7."
          } > /tmp/soak-issue-body.md
          NUM=$(gh issue list --state open --json number,title \
            --jq "first(.[] | select(.title==\"${TITLE}\")).number // empty")
          if [ -z "$NUM" ]; then
            URL=$(gh issue create --title "$TITLE" --body-file /tmp/soak-issue-body.md)
            NUM="${URL##*/}"
            echo "Opened issue #${NUM}"
            gh issue pin "$NUM" || echo "::warning::could not pin issue #${NUM} (pin needs push-level rights; issue still open)"
          else
            gh issue comment "$NUM" --body-file /tmp/soak-issue-body.md
            echo "Commented on existing issue #${NUM}"
          fi

      # On the first green after a red streak: comment resolution, unpin, close
      # (closing keeps subsequent greens from re-commenting — the title search
      # only matches OPEN issues).
      - name: Resolve alert issue on green
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TITLE='Soak check failing'
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          NUM=$(gh issue list --state open --json number,title \
            --jq "first(.[] | select(.title==\"${TITLE}\")).number // empty")
          if [ -z "$NUM" ]; then
            echo "No open soak-failure issue — nothing to resolve."
            exit 0
          fi
          gh issue unpin "$NUM" || echo "::warning::could not unpin issue #${NUM}"
          gh issue close "$NUM" --comment "Resolved — soak check is green again: ${RUN_URL}. Streak restarts from this run."
          echo "Closed issue #${NUM}"

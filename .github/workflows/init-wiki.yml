## Quick Start (60 seconds)

```bash
# 1. Start the endpoint
networker-endpoint

# 2. Run your first probe
networker-tester \
  --target https://127.0.0.1:8443/health \
  --modes http1,http2,http3 \
  --runs 5 \
  --insecure \
  --output-dir ./output
```

Open `output/report.html` in any browser.


# Protocol Comparison: H1 vs H2 vs H3

---

## Background

| Aspect | HTTP/1.1 | HTTP/2 | HTTP/3 |
|--------|----------|--------|--------|
| Transport | TCP | TCP | QUIC (UDP) |
| Multiplexing | None | Full (streams over one TCP conn) | Full (streams over one QUIC conn) |
| Head-of-line blocking | TCP + HTTP level | TCP level only | None |
| TLS | Kernel-offloaded | Kernel-offloaded | Userspace (per-datagram) |
| Connections for page loads | Up to 6 per host | 1 | 1 |
| Handshake phases | DNS + TCP + TLS | DNS + TCP + TLS | QUIC (combined, shown as `QUIC:Xms`) |

---

## Test 1: Request Latency

```bash
networker-tester \
  --target https://127.0.0.1:8443/health \
  --modes http1,http2,http3 \
  --runs 20 \
  --insecure
```

**Expected patterns:**
- CPU for HTTP/3 is 2-5x higher — QUIC encryption runs in userspace
- TTFB is similar on loopback; differences appear on real network links
- HTTP/3 shows `QUIC:Xms` (no separate DNS/TCP/TLS — QUIC combines them)

---

## Test 2: Download Throughput

```bash
networker-tester \
  --target https://127.0.0.1:8443/health \
  --modes download \
  --payload-sizes 1m,10m,100m \
  --runs 5 \
  --insecure
```

**Key metrics:**
- **Throughput** = body transfer rate (excludes connection setup)
- **Goodput** = full delivery rate (includes setup); always less than Throughput
- **Goodput gap is larger for H3** — the QUIC handshake is longer

---

## Test 3: Page-Load Comparison (the key test)

Simulates a browser fetching an HTML page with N parallel assets.

```bash
networker-tester \
  --target https://127.0.0.1:8443/health \
  --modes pageload,pageload2,pageload3 \
  --page-assets 30 \
  --page-asset-size 50k \
  --runs 10 \
  --insecure \
  --output-dir ./output
```

**Expected results:**

| Metric | H1.1 (`pageload`) | H2 (`pageload2`) | H3 (`pageload3`) |
|--------|-------------------|-------------------|-------------------|
| `total_ms` | Highest (HOL blocking + 6 conns) | Lower (full multiplex) | Similar to H/2 |
| `connections_opened` | Up to 6 | 1 | 1 |
| `tls_overhead_ratio` | Higher (6 TLS handshakes) | Lower (1 TLS handshake) | Similar to H/2 |
| `cpu_time_ms` | Lowest | Moderate | Highest (QUIC userspace) |

---

## Test 4: Asset Count Sweep

Find the crossover point where H2 multiplexing beats H1.1 connection pools (~6-10 assets):

```bash
for N in 5 10 20 40 80; do
  echo "=== $N assets ==="
  networker-tester \
    --target https://127.0.0.1:8443/health \
    --modes pageload,pageload2 \
    --page-assets $N \
    --page-asset-size 10k \
    --runs 5 \
    --insecure
done
```

---

## Test 5: Add Real Browser Metrics

```bash
# Requires: cargo build --release --features browser + Chrome/Chromium installed
networker-tester \
  --target https://127.0.0.1:8443/health \
  --modes pageload,pageload2,pageload3,browser \
  --page-assets 30 \
  --page-asset-size 50k \
  --runs 10 \
  --insecure \
  --output-dir ./output
```

Browser probe captures: Load time, DOMContentLoaded, TTFB, resource count,
bytes transferred, and per-protocol resource counts (e.g. `h2x18 h3x2`).

---

## Interpreting Results

| What to compare | What it tells you |
|-----------------|-------------------|
| `pageload` vs `pageload2` total_ms | Benefit of H2 multiplexing over H1.1 connection pools |
| `pageload2` vs `pageload3` total_ms | QUIC advantage on lossy/high-latency links |
| `connections_opened` in `pageload` | Should be <= 6; more connections = more TLS cost |
| `tls_overhead_ratio` in `pageload` | TLS as % of total — high = connection reuse helps |
| `cpu_time_ms` across protocols | H3 always higher due to userspace QUIC encryption |
| `browser` Load event vs `pageload` total | Gap = browser render/parse/JS overhead |

---

## CPU and Context Switch Interpretation

### CPU (`cpu_time_ms`)

- `http1`: lowest — kernel handles TCP; one TLS record layer
- `http2`: slightly higher — HPACK header compression
- `http3`: 2-5x higher — QUIC encrypts every UDP packet in userspace

The gap grows on real networks with large payloads because H3 processes more
packets (MTU-limited datagrams vs. larger TCP segments).

### Context switches (`CSW`)

- **Voluntary** (`v`): process yielded CPU waiting for I/O — higher for async-heavy protocols
- **Involuntary** (`i`): kernel preempted the process — higher under CPU pressure
- Server CSW (`sCSW`) is reported via `Server-Timing: csw-v;dur=N, csw-i;dur=N`

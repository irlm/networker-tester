## All Flags

### Targeting

| Flag | Default | Description |
|------|---------|-------------|
| `--target URL` | `http://localhost:8080/health` | URL to probe. Repeat for multi-target. |
| `--modes MODE,...` | `http1,http2,udp` | Comma-separated probe modes |
| `--runs N` | `3` | Repetitions per mode |
| `--concurrency N` | `1` | Concurrent requests per run |
| `--timeout N` | `30` | Per-request timeout in seconds |
| `--retries N` | `0` | Retry failed probes up to N times |

### Payload and throughput

| Flag | Default | Description |
|------|---------|-------------|
| `--payload-sizes LIST` | — | Sizes for download/upload (e.g. `64k,1m,10m`). Each size = separate probe. |

Size suffixes: `k` = KiB, `m` = MiB, `g` = GiB.

### Page-load tuning

| Flag | Default | Description |
|------|---------|-------------|
| `--page-assets N` | `20` | Number of assets per page-load simulation |
| `--page-asset-size SZ` | `10k` | Size of each simulated asset |

### Connection options

| Flag | Default | Description |
|------|---------|-------------|
| `--insecure` | — | Skip TLS certificate verification |
| `--ipv4-only` | — | Restrict to IPv4 |
| `--ipv6-only` | — | Restrict to IPv6 |
| `--no-proxy` | — | Bypass system proxy |

### Output

| Flag | Default | Description |
|------|---------|-------------|
| `--output-dir PATH` | `./output` | Directory for reports |
| `--html` | — | Write HTML report to `output/report.html` |
| `--excel` | — | Write Excel workbook to `output/report.xlsx` (8 sheets) |
| `--json` | — | Write structured JSON to stdout |
| `--verbose` / `-v` | — | Enable debug logging |

---

## Output Formats

### Terminal output

Every probe prints one line as it completes:

```
checkmark #1 [http2] 200 HTTP/2  DNS:0.3ms TCP:0.2ms TLS:3.9ms TTFB:0.4ms Total:4.6ms CPU:0.9ms CSW:3v/0i
checkmark #1 [http3] 200 HTTP/3  QUIC:1.5ms TTFB:0.4ms Total:2.1ms CPU:2.4ms CSW:4v/1i
```

HTTP/3 shows `QUIC:Xms` instead of separate DNS/TCP/TLS phases because QUIC combines
transport and crypto into a single UDP-based handshake.

### HTML report (`--html`)

Sections: Run Summary, Timing Breakdown, Protocol Comparison, Throughput Results,
All Attempts, TCP Stats, TLS Details, UDP Statistics.

For multiple targets, a Cross-Target Comparison table appears at the top with % delta
vs the first (baseline) target.

### Excel workbook (`--excel`)

Eight worksheets: Summary, HTTP Timings, TCP Stats, TLS Details, UDP Stats, Throughput,
Server Timing, Errors.


name: Initialize Wiki

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Write wiki pages and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"

          # Try cloning first (works if wiki already initialized)
          if git clone "$WIKI_URL" /tmp/wiki 2>/dev/null; then
            echo "Wiki already initialized, updating pages"
          else
            echo "Wiki not initialized, bootstrapping"
            mkdir -p /tmp/wiki
            cd /tmp/wiki
            git init -b master
            git remote add origin "$WIKI_URL"
          fi

          cd /tmp/wiki

          cat > Home.md << 'MARKDOWN'
# Networker Tester

A cross-platform network diagnostics suite that probes an endpoint across TCP, HTTP/1.1,
HTTP/2, HTTP/3, and UDP — collecting per-phase telemetry that is normally buried in the
kernel or scattered across multiple tools.

```
networker-tester  ──────────────────────►  networker-endpoint
(Rust CLI)           TCP / HTTP1 / HTTP2   (Rust server)
                      HTTP3 (QUIC)
                      UDP echo
        │
        ▼
JSON artifact  ·  HTML report  ·  Excel workbook
```

---

## What It Measures

| Metric | Why it matters |
|--------|---------------|
| **TTFB** | Head-of-line blocking sensitivity; H/2 and H/3 should win on high-latency links |
| **Throughput / Goodput** | Raw transfer rate vs. true end-to-end rate (including connection setup) |
| **CPU** | QUIC does TLS in userspace — measurably higher than H/1.1 or H/2 |
| **Context switches** | Voluntary (I/O yield) and involuntary (preemption); reflects concurrency differences |
| **Page-load total** | Wall-clock impact of multiplexing; H/2 and H/3 win on multi-asset pages |
| **TCP kernel stats** | RTT, cwnd, ssthresh, retransmits, delivery rate — via `getsockopt`, no root needed |
| **TLS details** | Version, cipher suite, ALPN, full certificate chain |
| **UDP RTT / jitter / loss** | Raw UDP path quality |

---

## Quick Install

### macOS and Linux

```bash

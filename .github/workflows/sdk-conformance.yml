name: SDK conformance

# Per-language conformance gate for the LagHound SDKs. Each job runs that SDK's
# own conformance suite, all pinned to shared/sdk-contract-v1.json.
#
# This closes the gap that the Go / JS / Rust SDKs had no CI gate. The C# SDK
# (LagHound.Endpoint + LagHound.Endpoint.Tests) is already in Networker.sln and
# rides the "Build & audit (C#)" job in dotnet.yml (dotnet build + dotnet test),
# so it is deliberately NOT duplicated here.
#
# Action SHAs are pinned to match the other workflows (ci.yml / benchmark.yml).

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "sdk/**"
      - "shared/sdk-contract-v1.json"
      - ".github/workflows/sdk-conformance.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "sdk/**"
      - "shared/sdk-contract-v1.json"
      - ".github/workflows/sdk-conformance.yml"

permissions:
  contents: read

jobs:
  go:
    name: Go SDK conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"
          cache-dependency-path: sdk/go/go.mod

      - name: gofmt (must be clean)
        working-directory: sdk/go
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"; echo "$unformatted"
            exit 1
          fi

      - name: go test (race)
        working-directory: sdk/go
        run: go test -race ./...

  js:
    name: JS SDK conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"

      - name: npm ci
        working-directory: sdk/js
        # No package-lock deps beyond dev tooling; ci falls back cleanly.
        run: npm ci

      - name: build
        working-directory: sdk/js
        run: npm run build

      - name: test
        working-directory: sdk/js
        run: npm test

  python:
    name: Python SDK conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run conformance suite
        working-directory: sdk/python
        # SDK has zero runtime deps (stdlib only). Prefer pytest if available,
        # otherwise the suite runs standalone via stdlib unittest.
        run: |
          python -m pip install --upgrade pip
          if python -m pytest --version >/dev/null 2>&1; then
            python -m pytest
          else
            python -m pip install pytest && python -m pytest || python tests/test_conformance.py
          fi

  rust:
    name: Rust SDK conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: sdk/rust
          key: sdk-rust

      - name: cargo fmt (check)
        working-directory: sdk/rust
        run: cargo fmt --check

      - name: cargo clippy (deny warnings)
        working-directory: sdk/rust
        run: cargo clippy --all-features -- -D warnings

      - name: cargo test (all features)
        working-directory: sdk/rust
        run: cargo test --all-features

  # C# note: LagHound.Endpoint + LagHound.Endpoint.Tests are in Networker.sln and
  # are covered by the "Build & audit (C#)" job in dotnet.yml (dotnet build +
  # dotnet test Networker.sln). Intentionally not duplicated here.

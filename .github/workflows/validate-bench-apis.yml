name: Validate Benchmark APIs (all languages)

# Validates every reference API image against the frozen contract in
# benchmarks/shared/API-SPEC.md.
#
# Design (post-audit, see docs/analysis/language-bench-audit.md V1/V5/V6/V7):
# - One matrix leg per language: a broken Ruby image can no longer abort
#   validation of the other seven (14/14 runs failed that way for 3 months).
# - Required per leg: image builds, container boots, /health meets the
#   orchestrator contract (status/runtime/version, constant body).
# - Spec conformance (canonical shapes + §7 checksums, dataset mounted) is
#   REQUIRED for every language (hard since wave-2 convergence, 2026-07-17 —
#   the first all-green matrix). A conformance failure is a real regression.
# - Runs on every PR touching benchmarks/** — not just the weekly cron.
# - PR/push runs validate csharp-net8 as the C# ladder representative (17
#   docker builds per PR is enough); the weekly cron and workflow_dispatch
#   expand the matrix to all 8 Linux-buildable C# variants (P1#15). The
#   template drift-check (generate-variants.py --check) runs on EVERY run,
#   so a PR can't silently diverge one variant from the template.

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 6am UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "benchmarks/**"
      - "crates/networker-endpoint/**"
      - ".github/workflows/validate-bench-apis.yml"
  pull_request:
    paths:
      - "benchmarks/**"
      - "crates/networker-endpoint/**"
      - ".github/workflows/validate-bench-apis.yml"

permissions:
  contents: read

jobs:
  # Cheap guard on EVERY run (PR + weekly): the nine C# variants are generated
  # from csharp-template/ — hand-edits to a single variant defeat the "only
  # the runtime differs" premise (API-SPEC.md §8, audit F13). This catches
  # drift even on PR runs where only csharp-net8 gets docker-validated.
  template-drift:
    name: C# template drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
      - name: generate-variants.py --check
        run: python3 benchmarks/reference-apis/csharp-template/generate-variants.py --check

  rust-baseline:
    name: Canonical baseline (Rust, full conformance)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5

      # The canonical implementation must pass EVERYTHING, including the §7
      # canonical-response checksums against the shared dataset
      # (--rust-only implies --require-conformance).
      - name: Validate networker-endpoint against API-SPEC.md
        run: |
          chmod +x benchmarks/validate/run-validation.sh
          ./benchmarks/validate/run-validation.sh --rust-only

  language:
    name: ${{ matrix.lang }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Fast matrix (PR + push): one leg per language, csharp-net8 stands in
        # for the whole C# runtime ladder (all nine variants are generated
        # from one template — the template-drift job proves it every run).
        #
        # Weekly cron + workflow_dispatch: the matrix expands to ALL 8
        # Linux-buildable C# variants (net6/net7/net8/net8-aot/net9/net9-aot/
        # net10/net10-aot), each as its own isolated leg (P1#15).
        #
        # ── csharp-net48 IS DELIBERATELY EXCLUDED ─────────────────────────
        # .NET Framework 4.8 has no Linux runtime; its Dockerfile requires a
        # Windows container host, which ubuntu-latest runners cannot provide.
        # It is desk-checked only (generated from the same template + reviewed
        # by hand; runtime confirmation tracked in audit C8). The verdict job
        # prints this caveat into the weekly run summary so it can't be
        # mistaken for a validated variant.
        # ───────────────────────────────────────────────────────────────────
        lang: ${{ fromJSON((github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
          && '["go","python","nodejs","java","ruby","php","cpp","csharp-net6","csharp-net7","csharp-net8","csharp-net8-aot","csharp-net9","csharp-net9-aot","csharp-net10","csharp-net10-aot"]'
          || '["go","python","nodejs","java","ruby","php","cpp","csharp-net8"]') }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5

      - name: Build image
        run: docker build -t bench-${{ matrix.lang }} benchmarks/reference-apis/${{ matrix.lang }}

      - name: Boot container (certs + shared dataset mounted)
        run: |
          mkdir -p /tmp/bench
          openssl req -x509 -newkey rsa:2048 \
            -keyout /tmp/bench/key.pem -out /tmp/bench/cert.pem \
            -days 1 -nodes -subj '/CN=bench'
          cp benchmarks/reference-apis/shared/bench-data.json /tmp/bench/
          docker run -d --name bench-srv -p 8443:8443 \
            -e BENCH_CERT_DIR=/opt/bench \
            -e BENCH_PORT=8443 \
            -e BENCH_DATA_PATH=/opt/bench/bench-data.json \
            -v /tmp/bench:/opt/bench:ro \
            bench-${{ matrix.lang }}
          for i in $(seq 1 30); do
            if curl -skf --max-time 3 https://localhost:8443/health > /dev/null; then
              echo "healthy after ~$((i * 2))s"; exit 0
            fi
            if [ -z "$(docker ps -q -f name=bench-srv)" ]; then
              echo "::error::container exited during startup"; break
            fi
            sleep 2
          done
          echo "::error::${{ matrix.lang }} never became healthy"
          docker logs bench-srv || true
          exit 1

      - name: Validate against API-SPEC.md
        run: |
          chmod +x benchmarks/validate/run-validation.sh
          set +e
          ./benchmarks/validate/run-validation.sh \
            --url=https://localhost:8443 --name=${{ matrix.lang }}
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "| ${{ matrix.lang }} | ✅ build | ✅ health | ✅ spec-conformant |" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$code" -eq 2 ]; then
            # HARD since wave 2 converged (2026-07-17): every implementation is
            # ported, so a conformance regression is a real break, not a
            # pending port.
            echo "| ${{ matrix.lang }} | ✅ build | ✅ health | ❌ NOT spec-conformant |" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::${{ matrix.lang }} violates API-SPEC.md (conformance is required post-wave-2)"
            exit 1
          else
            echo "| ${{ matrix.lang }} | ✅ build | ❌ health/boot | — |" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Container logs (on failure)
        if: failure()
        run: docker logs bench-srv || true

      - name: Cleanup
        if: always()
        run: docker rm -f bench-srv || true

  verdict:
    name: Verdict
    runs-on: ubuntu-latest
    needs: [template-drift, rust-baseline, language]
    if: always()
    steps:
      - name: csharp-net48 caveat (weekly full-ladder runs)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          echo "| csharp-net48 | ⚠️ desk-checked only | .NET Framework 4.8 is Windows-container-only — never built/validated on these Linux runners (audit C8) |" >> "$GITHUB_STEP_SUMMARY"
      - name: Aggregate results
        run: |
          echo "template-drift: ${{ needs.template-drift.result }}"
          echo "rust-baseline: ${{ needs.rust-baseline.result }}"
          echo "language matrix: ${{ needs.language.result }}"
          if [ "${{ needs.template-drift.result }}" != "success" ]; then
            echo "::error::C# variants have drifted from csharp-template (run generate-variants.py and commit)"
            exit 1
          fi
          if [ "${{ needs.rust-baseline.result }}" != "success" ]; then
            echo "::error::canonical Rust baseline failed spec conformance"
            exit 1
          fi
          if [ "${{ needs.language.result }}" != "success" ]; then
            echo "::error::one or more language images failed to build/boot or violated the /health contract"
            exit 1
          fi
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Full ladder green: all 8 Linux-buildable C# variants + 7 other languages + Rust baseline conform to API-SPEC.md (csharp-net48 desk-checked only)."
          else
            echo "Fast matrix green: 8 languages (csharp-net8 as C# ladder representative) + Rust baseline conform to API-SPEC.md."
          fi

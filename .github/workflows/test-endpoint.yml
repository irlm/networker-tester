name: Endpoint Tests

# Run on every push/PR that touches the endpoint crate or its bats tests.
on:
  push:
    branches: ["main", "develop"]
    paths:
      - "crates/networker-endpoint/**"
      - "tests/endpoint.bats"
      - ".github/workflows/test-endpoint.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "crates/networker-endpoint/**"
      - "tests/endpoint.bats"
      - ".github/workflows/test-endpoint.yml"

permissions:
  contents: read

jobs:
  # ── Rust unit tests (fast, no binary needed) ────────────────────────────────
  cargo-test:
    name: cargo test (networker-endpoint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-endpoint-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-endpoint-

      - name: Run unit tests
        run: cargo test -p networker-endpoint

  # ── bats integration tests (builds binary, tests via curl) ──────────────────
  bats:
    name: bats (endpoint integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-endpoint-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-endpoint-

      - name: Build networker-endpoint
        run: cargo build -p networker-endpoint

      - name: Install bats-core
        run: sudo apt-get install -y bats

      - name: Run endpoint integration tests
        run: bats --tap tests/endpoint.bats

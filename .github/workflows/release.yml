name: Release

# Triggered by pushing a version tag, e.g.:
#
#   git tag v0.12.11 <merge-commit>
#   git push origin v0.12.11
#
# The workflow:
#   1. Builds native binaries for Linux x64, macOS x64, macOS ARM64, Windows x64.
#   2. Extracts the matching CHANGELOG section for the release notes.
#   3. Creates a GitHub release with the notes and the compiled binary archives.

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write   # required to create releases and upload assets

jobs:
  # ── Build binaries for each supported platform ─────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target:  x86_64-unknown-linux-musl
            os:      ubuntu-latest
            ext:     ""
            archive: tar.gz

          - target:  x86_64-apple-darwin
            os:      macos-latest      # cross-compile Intel from ARM64 runner
            ext:     ""
            archive: tar.gz

          - target:  aarch64-apple-darwin
            os:      macos-latest      # Apple Silicon (arm64)
            ext:     ""
            archive: tar.gz

          - target:  x86_64-pc-windows-msvc
            os:      windows-latest
            ext:     ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      - name: Install musl tools (Linux static linking)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update -qq && sudo apt-get install -y musl-tools

      - name: Build binaries
        run: >
          cargo build --release --locked
          --target ${{ matrix.target }}
          --features browser
          -p networker-tester -p networker-endpoint
        env:
          # Static-link the VC++ runtime on Windows so binaries work on clean
          # Windows Server images (e.g. GCP) without installing vcredist.
          RUSTFLAGS: ${{ contains(matrix.target, 'windows') && '-C target-feature=+crt-static' || '' }}

      # ── Package (Unix: .tar.gz) ──────────────────────────────────────────
      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          SRC="target/${TARGET}/release"
          mkdir -p dist

          tar czf "dist/networker-tester-${TARGET}.tar.gz" \
              -C "${SRC}" "networker-tester"
          tar czf "dist/networker-endpoint-${TARGET}.tar.gz" \
              -C "${SRC}" "networker-endpoint"

      # ── Package (Windows: .zip) ──────────────────────────────────────────
      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $src    = "target\$target\release"
          New-Item -ItemType Directory -Force dist | Out-Null

          Compress-Archive `
              -Path "$src\networker-tester.exe" `
              -DestinationPath "dist\networker-tester-$target.zip" `
              -Force
          Compress-Archive `
              -Path "$src\networker-endpoint.exe" `
              -DestinationPath "dist\networker-endpoint-$target.zip" `
              -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/

  # ── Create GitHub release and attach all binary archives ─────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      # Extract the release notes for this version from CHANGELOG.md.
      # Matches the section header "## [X.Y.Z]" and captures everything
      # until the next "## [" heading.
      - name: Extract release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "
            /^## \[${VERSION}\]/ { found=1; next }
            found && /^## \[/    { exit }
            found                { print }
          " CHANGELOG.md | sed '/^[[:space:]]*$/d' | sed '1s/^[[:space:]]*//')
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          {
            echo 'notes<<RELEASE_NOTES_EOF'
            echo "$NOTES"
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        run: |
          echo "$NOTES" > /tmp/release-notes.md
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md \
            dist/*
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES: ${{ steps.notes.outputs.notes }}

name: Release

# Triggered by pushing a version tag, e.g.:
#
#   git tag v0.12.11 <merge-commit>
#   git push origin v0.12.11
#
# The workflow:
#   1. Builds native binaries for Linux x64, macOS x64, macOS ARM64, Windows x64.
#   2. Extracts the matching CHANGELOG section for the release notes.
#   3. Creates a GitHub release with the notes and the compiled binary archives.

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v0.20.1)'
        required: true

permissions:
  contents: write   # required to create releases and upload assets

env:
  # Resolve tag from either trigger type
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build binaries for each supported platform ─────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target:  x86_64-unknown-linux-musl
            os:      ubuntu-latest
            ext:     ""
            archive: tar.gz

          - target:  x86_64-apple-darwin
            os:      macos-latest      # cross-compile Intel from ARM64 runner
            ext:     ""
            archive: tar.gz

          - target:  aarch64-apple-darwin
            os:      macos-latest      # Apple Silicon (arm64)
            ext:     ""
            archive: tar.gz

          - target:  x86_64-pc-windows-msvc
            os:      windows-latest
            ext:     ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      - name: Install musl tools (Linux static linking)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update -qq && sudo apt-get install -y musl-tools

      - name: Build workspace binaries
        run: >
          cargo build --release --locked
          --target ${{ matrix.target }}
          --features browser
          -p networker-tester -p networker-endpoint -p networker-dashboard -p networker-agent

      - name: Build orchestrator
        run: >
          cargo build --release --locked
          --target ${{ matrix.target }}
          --manifest-path benchmarks/orchestrator/Cargo.toml
        env:
          # Static-link the VC++ runtime on Windows so binaries work on clean
          # Windows Server images (e.g. GCP) without installing vcredist.
          RUSTFLAGS: ${{ contains(matrix.target, 'windows') && '-C target-feature=+crt-static' || '' }}

      # ── Package (Unix: .tar.gz) ──────────────────────────────────────────
      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          SRC="target/${TARGET}/release"
          mkdir -p dist

          tar czf "dist/networker-tester-${TARGET}.tar.gz" \
              -C "${SRC}" "networker-tester"
          tar czf "dist/networker-endpoint-${TARGET}.tar.gz" \
              -C "${SRC}" "networker-endpoint"
          tar czf "dist/networker-dashboard-${TARGET}.tar.gz" \
              -C "${SRC}" "networker-dashboard"
          tar czf "dist/networker-agent-${TARGET}.tar.gz" \
              -C "${SRC}" "networker-agent"

          ORCH_SRC="benchmarks/orchestrator/target/${TARGET}/release"
          tar czf "dist/alethabench-${TARGET}.tar.gz" \
              -C "${ORCH_SRC}" "alethabench"

      # ── Package (Windows: .zip) ──────────────────────────────────────────
      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $src    = "target\$target\release"
          New-Item -ItemType Directory -Force dist | Out-Null

          Compress-Archive `
              -Path "$src\networker-tester.exe" `
              -DestinationPath "dist\networker-tester-$target.zip" `
              -Force
          Compress-Archive `
              -Path "$src\networker-endpoint.exe" `
              -DestinationPath "dist\networker-endpoint-$target.zip" `
              -Force
          Compress-Archive `
              -Path "$src\networker-dashboard.exe" `
              -DestinationPath "dist\networker-dashboard-$target.zip" `
              -Force
          Compress-Archive `
              -Path "$src\networker-agent.exe" `
              -DestinationPath "dist\networker-agent-$target.zip" `
              -Force

          $orchSrc = "benchmarks\orchestrator\target\$target\release"
          Compress-Archive `
              -Path "$orchSrc\alethabench.exe" `
              -DestinationPath "dist\alethabench-$target.zip" `
              -Force

      # ── Build frontend (only once, on Linux) ─────────────────────────────
      - name: Setup Node.js
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Build dashboard frontend
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          cd dashboard && npm ci --ignore-scripts && npm run build
          tar czf "../dist/dashboard-frontend.tar.gz" -C dist .

      - name: Upload build artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: dist-${{ matrix.target }}
          path: dist/

  # ── Create GitHub release and attach all binary archives ─────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download all build artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      # Extract the release notes for this version from CHANGELOG.md.
      # Matches the section header "## [X.Y.Z]" and captures everything
      # until the next "## [" heading.
      - name: Extract release notes
        id: notes
        run: |
          VERSION="${RELEASE_TAG#v}"
          NOTES=$(awk "
            /^## \[${VERSION}\]/ { found=1; next }
            found && /^## \[/    { exit }
            found                { print }
          " CHANGELOG.md | sed '/^[[:space:]]*$/d' | sed '1s/^[[:space:]]*//')
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          {
            echo 'notes<<RELEASE_NOTES_EOF'
            echo "$NOTES"
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        run: |
          echo "$NOTES" > /tmp/release-notes.md
          gh release create "${{ env.RELEASE_TAG }}" \
            --title "${{ env.RELEASE_TAG }}" \
            --notes-file /tmp/release-notes.md \
            dist/*
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES: ${{ steps.notes.outputs.notes }}

  # ── Deploy to Azure dashboard (alethedash.com) ───────────────────────────
  # Uses Azure service principal + az vm run-command (no SSH keys).
  # Audit trail in Azure Activity Log, RBAC-controlled, no secrets on VM.
  deploy:
    name: Deploy to alethedash.com
    needs: release
    runs-on: ubuntu-latest
    if: success()
    environment: production

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Azure Login
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy binaries and frontend
        run: |
          VERSION="${RELEASE_TAG#v}"
          echo "Deploying v${VERSION} to alethedash-vm..."

          RESULT=$(az vm run-command invoke \
            --resource-group ALETHEDASH-RG \
            --name alethedash-vm \
            --command-id RunShellScript \
            --scripts "
              set -e
              RELEASE_BASE='https://github.com/irlm/networker-tester/releases/download/v${VERSION}'

              # ── Download all artifacts ──────────────────────────────────
              echo '>> Downloading v${VERSION} binaries...'
              curl -fsSL \"\${RELEASE_BASE}/networker-dashboard-x86_64-unknown-linux-musl.tar.gz\" | tar xz -C /tmp/
              curl -fsSL \"\${RELEASE_BASE}/networker-endpoint-x86_64-unknown-linux-musl.tar.gz\" | tar xz -C /tmp/
              curl -fsSL \"\${RELEASE_BASE}/networker-agent-x86_64-unknown-linux-musl.tar.gz\" | tar xz -C /tmp/
              curl -fsSL \"\${RELEASE_BASE}/networker-tester-x86_64-unknown-linux-musl.tar.gz\" | tar xz -C /tmp/
              curl -fsSL \"\${RELEASE_BASE}/alethabench-x86_64-unknown-linux-musl.tar.gz\" | tar xz -C /tmp/

              echo '>> Downloading frontend...'
              curl -fsSL \"\${RELEASE_BASE}/dashboard-frontend.tar.gz\" -o /tmp/dashboard-frontend.tar.gz

              # ── Stop services via systemd ───────────────────────────────
              echo '>> Stopping services...'
              systemctl stop networker-agent 2>/dev/null || true
              systemctl stop networker-dashboard 2>/dev/null || true
              systemctl stop networker-endpoint 2>/dev/null || true
              sleep 1

              # Safety: kill any orphan processes on our ports
              for PORT in 3000 8080 8443; do
                lsof -ti:\${PORT} 2>/dev/null | xargs -r kill -9 || true
              done
              sleep 1

              # ── Install binaries ────────────────────────────────────────
              echo '>> Installing new binaries...'
              cp /tmp/networker-dashboard /opt/alethedash/networker-dashboard
              cp /tmp/networker-endpoint /opt/alethedash/networker-endpoint
              mkdir -p /opt/alethedash/tester
              cp /tmp/networker-agent /opt/alethedash/tester/networker-agent 2>/dev/null || true
              cp /tmp/networker-tester /opt/alethedash/tester/networker-tester 2>/dev/null || true
              cp /tmp/alethabench /usr/local/bin/alethabench 2>/dev/null || true
              chmod +x /opt/alethedash/networker-dashboard /opt/alethedash/networker-endpoint \
                /opt/alethedash/tester/networker-agent /opt/alethedash/tester/networker-tester \
                /usr/local/bin/alethabench
              rm -f /tmp/networker-dashboard /tmp/networker-endpoint /tmp/networker-agent \
                /tmp/networker-tester /tmp/alethabench

              # ── Install frontend ────────────────────────────────────────
              echo '>> Installing frontend...'
              mkdir -p /opt/alethedash/dashboard/dist
              rm -rf /opt/alethedash/dashboard/dist/*
              tar xzf /tmp/dashboard-frontend.tar.gz -C /opt/alethedash/dashboard/dist
              rm -f /tmp/dashboard-frontend.tar.gz

              # ── Start services via systemd ──────────────────────────────
              echo '>> Starting services...'
              systemctl start networker-endpoint
              systemctl start networker-dashboard
              sleep 3
              systemctl start networker-agent

              # ── Health check ────────────────────────────────────────────
              echo '>> Waiting for dashboard health check...'
              HEALTHY=0
              for i in \$(seq 1 15); do
                HTTP_CODE=\$(curl -s -o /dev/null -w '%{http_code}' --max-time 2 http://localhost:3000/api/auth/login -X POST -H 'Content-Type: application/json' -d '{\"email\":\"healthcheck\",\"password\":\"probe\"}' 2>/dev/null || echo '000')
                if [ \"\${HTTP_CODE}\" = '401' ]; then
                  HEALTHY=1
                  echo \">> Dashboard healthy (HTTP \${HTTP_CODE} on attempt \${i})\"
                  break
                fi
                echo \"   attempt \${i}: HTTP \${HTTP_CODE}\"
                sleep 2
              done

              if [ \"\${HEALTHY}\" -ne 1 ]; then
                echo '>> DEPLOY_FAILED: Dashboard not responding after 30s'
                systemctl --no-pager status networker-dashboard || true
                tail -10 /opt/alethedash/dashboard.log || true
                exit 1
              fi

              # ── Service status summary ──────────────────────────────────
              echo '>> Service status:'
              echo \"   dashboard: \$(systemctl is-active networker-dashboard)\"
              echo \"   endpoint:  \$(systemctl is-active networker-endpoint)\"
              echo \"   agent:     \$(systemctl is-active networker-agent)\"
              echo \">> Deploy v${VERSION} complete\"
            " \
            --query "value[0].message" -o tsv)

          echo "$RESULT"
          if echo "$RESULT" | grep -q 'DEPLOY_FAILED'; then
            echo "::error::Deploy failed — see output above"
            exit 1
          fi

      - name: Update Gist
        run: |
          jq -n --rawfile sh install.sh --rawfile ps install.ps1 \
            '{"files":{"install.sh":{"content":$sh},"install.ps1":{"content":$ps}}}' \
            > /tmp/gist_payload.json
          gh api --method PATCH /gists/37a1af64b70ef6e58ea117839407f4f9 \
            --input /tmp/gist_payload.json --jq '.updated_at' || echo "Gist update failed (non-fatal)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify deployment
        run: |
          echo "Verifying deployment..."
          sleep 5
          RESULT=$(az vm run-command invoke \
            --resource-group ALETHEDASH-RG \
            --name alethedash-vm \
            --command-id RunShellScript \
            --scripts "
              set -e
              echo '=== Service status ==='
              echo \"dashboard: \$(systemctl is-active networker-dashboard)\"
              echo \"endpoint:  \$(systemctl is-active networker-endpoint)\"
              echo \"agent:     \$(systemctl is-active networker-agent)\"

              echo '=== Binary versions ==='
              echo \"tester:       \$(/opt/alethedash/tester/networker-tester --version 2>/dev/null || echo 'missing')\"
              echo \"orchestrator: \$(alethabench --version 2>/dev/null || echo 'missing')\"

              echo '=== Dashboard API check ==='
              HTTP_CODE=\$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:3000/api/auth/login -X POST -H 'Content-Type: application/json' -d '{\"email\":\"verify\",\"password\":\"probe\"}' 2>/dev/null || echo '000')
              echo \"Dashboard API: HTTP \${HTTP_CODE}\"
              if [ \"\${HTTP_CODE}\" != '401' ]; then
                echo 'VERIFY_FAILED: Dashboard not responding'
                exit 1
              fi

              echo 'VERIFY_OK'
            " \
            --query "value[0].message" -o tsv)

          echo "$RESULT"
          if echo "$RESULT" | grep -q 'VERIFY_FAILED'; then
            echo "::error::Deployment verification failed"
            exit 1
          fi
          echo "Deployment verified successfully"

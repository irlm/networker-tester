name: Release

# Triggered by pushing a version tag, e.g.:
#
#   git tag v0.12.11 <merge-commit>
#   git push origin v0.12.11
#
# The workflow:
#   1. Builds native binaries for Linux x64, macOS x64, macOS ARM64, Windows x64.
#   2. Extracts the matching CHANGELOG section for the release notes.
#   3. Creates a GitHub release with the notes and the compiled binary archives.

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write   # required to create releases and upload assets

jobs:
  # ── Build binaries for each supported platform ─────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target:  x86_64-unknown-linux-musl
            os:      ubuntu-latest
            ext:     ""
            archive: tar.gz

          - target:  x86_64-apple-darwin
            os:      macos-latest      # cross-compile Intel from ARM64 runner
            ext:     ""
            archive: tar.gz

          - target:  aarch64-apple-darwin
            os:      macos-latest      # Apple Silicon (arm64)
            ext:     ""
            archive: tar.gz

          - target:  x86_64-pc-windows-msvc
            os:      windows-latest
            ext:     ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      - name: Install musl tools (Linux static linking)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update -qq && sudo apt-get install -y musl-tools

      - name: Build binaries
        run: >
          cargo build --release --locked
          --target ${{ matrix.target }}
          --features browser
          -p networker-tester -p networker-endpoint -p networker-dashboard -p networker-agent
        env:
          # Static-link the VC++ runtime on Windows so binaries work on clean
          # Windows Server images (e.g. GCP) without installing vcredist.
          RUSTFLAGS: ${{ contains(matrix.target, 'windows') && '-C target-feature=+crt-static' || '' }}

      # ── Package (Unix: .tar.gz) ──────────────────────────────────────────
      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          SRC="target/${TARGET}/release"
          mkdir -p dist

          tar czf "dist/networker-tester-${TARGET}.tar.gz" \
              -C "${SRC}" "networker-tester"
          tar czf "dist/networker-endpoint-${TARGET}.tar.gz" \
              -C "${SRC}" "networker-endpoint"
          tar czf "dist/networker-dashboard-${TARGET}.tar.gz" \
              -C "${SRC}" "networker-dashboard"
          tar czf "dist/networker-agent-${TARGET}.tar.gz" \
              -C "${SRC}" "networker-agent"

      # ── Package (Windows: .zip) ──────────────────────────────────────────
      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $src    = "target\$target\release"
          New-Item -ItemType Directory -Force dist | Out-Null

          Compress-Archive `
              -Path "$src\networker-tester.exe" `
              -DestinationPath "dist\networker-tester-$target.zip" `
              -Force
          Compress-Archive `
              -Path "$src\networker-endpoint.exe" `
              -DestinationPath "dist\networker-endpoint-$target.zip" `
              -Force
          Compress-Archive `
              -Path "$src\networker-dashboard.exe" `
              -DestinationPath "dist\networker-dashboard-$target.zip" `
              -Force
          Compress-Archive `
              -Path "$src\networker-agent.exe" `
              -DestinationPath "dist\networker-agent-$target.zip" `
              -Force

      # ── Build frontend (only once, on Linux) ─────────────────────────────
      - name: Setup Node.js
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Build dashboard frontend
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          cd dashboard && npm ci --ignore-scripts && npm run build
          tar czf "../dist/dashboard-frontend.tar.gz" -C dist .

      - name: Upload build artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: dist-${{ matrix.target }}
          path: dist/

  # ── Create GitHub release and attach all binary archives ─────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download all build artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      # Extract the release notes for this version from CHANGELOG.md.
      # Matches the section header "## [X.Y.Z]" and captures everything
      # until the next "## [" heading.
      - name: Extract release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "
            /^## \[${VERSION}\]/ { found=1; next }
            found && /^## \[/    { exit }
            found                { print }
          " CHANGELOG.md | sed '/^[[:space:]]*$/d' | sed '1s/^[[:space:]]*//')
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          {
            echo 'notes<<RELEASE_NOTES_EOF'
            echo "$NOTES"
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        run: |
          echo "$NOTES" > /tmp/release-notes.md
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md \
            dist/*
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES: ${{ steps.notes.outputs.notes }}

  # ── Deploy to Azure dashboard (alethedash.com) ───────────────────────────
  deploy:
    name: Deploy to alethedash.com
    needs: release
    runs-on: ubuntu-latest
    if: success()
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download Linux binary artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: dist-x86_64-unknown-linux-musl
          path: dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy binaries
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST}"
          SCP="scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          echo "Deploying to ${DEPLOY_HOST}..."

          # Extract binaries
          cd dist
          tar xzf networker-dashboard-x86_64-unknown-linux-musl.tar.gz
          tar xzf networker-endpoint-x86_64-unknown-linux-musl.tar.gz
          tar xzf networker-agent-x86_64-unknown-linux-musl.tar.gz

          # Upload
          ${SCP} networker-dashboard networker-endpoint networker-agent "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/"

          # Stop, replace, start
          ${SSH} bash -s <<'DEPLOY_SCRIPT'
          set -e
          echo ">> Stopping services..."
          sudo systemctl stop networker-dashboard 2>/dev/null || true
          sudo systemctl stop networker-endpoint 2>/dev/null || true
          sudo systemctl stop networker-agent 2>/dev/null || true

          echo ">> Installing new binaries..."
          sudo mv /tmp/networker-dashboard /usr/local/bin/networker-dashboard
          sudo mv /tmp/networker-endpoint /usr/local/bin/networker-endpoint
          sudo mv /tmp/networker-agent /usr/local/bin/networker-agent
          sudo chmod +x /usr/local/bin/networker-dashboard /usr/local/bin/networker-endpoint /usr/local/bin/networker-agent

          echo ">> Starting services..."
          sudo systemctl start networker-endpoint 2>/dev/null || true
          sudo systemctl start networker-dashboard 2>/dev/null || true
          sudo systemctl start networker-agent 2>/dev/null || true

          echo ">> Waiting for health check..."
          for i in $(seq 1 15); do
            if curl -sk --max-time 2 https://localhost/api/health 2>/dev/null | grep -q "ok"; then
              echo ">> Dashboard healthy!"
              break
            fi
            sleep 2
          done
          echo ">> Deploy complete"
          DEPLOY_SCRIPT

      - name: Deploy frontend
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST}"
          SCP="scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          if [ -f dist/dashboard-frontend.tar.gz ]; then
            ${SCP} dist/dashboard-frontend.tar.gz "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/"
            ${SSH} bash -s <<'FRONTEND_SCRIPT'
            set -e
            sudo mkdir -p /var/www/dashboard
            sudo tar xzf /tmp/dashboard-frontend.tar.gz -C /var/www/dashboard
            sudo chown -R www-data:www-data /var/www/dashboard 2>/dev/null || true
            rm -f /tmp/dashboard-frontend.tar.gz
            echo ">> Frontend deployed"
            FRONTEND_SCRIPT
          fi

      - name: Update Gist
        run: |
          jq -n --rawfile sh install.sh --rawfile ps install.ps1 \
            '{"files":{"install.sh":{"content":$sh},"install.ps1":{"content":$ps}}}' \
            > /tmp/gist_payload.json
          gh api --method PATCH /gists/37a1af64b70ef6e58ea117839407f4f9 \
            --input /tmp/gist_payload.json --jq '.updated_at' || echo "Gist update failed (non-fatal)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify deployment
        run: |
          echo "Checking https://${DEPLOY_HOST}..."
          sleep 5
          VERSION=$(curl -sk --max-time 10 "https://${DEPLOY_HOST}/api/health" | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','unknown'))" 2>/dev/null || echo "unreachable")
          echo "Deployed version: ${VERSION}"
          echo "Expected version: ${GITHUB_REF_NAME#v}"

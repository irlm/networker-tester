name: Release

# Triggered by pushing a version tag, e.g.:
#
#   git tag v0.28.15 <merge-commit>
#   git push origin v0.28.15
#
# The workflow — DEPLOY-FIRST GRAPH (the deploy never waits for Windows/mac):
#   1. build-linux (+ sccache) builds the deploy-critical artifacts: tester/
#      endpoint/agent (musl), alethabench, and the frontend. build-csharp
#      publishes the control plane. These two gate everything (~6 min).
#   2. release publishes the GitHub release with the linux + C# assets.
#   3. deploy ships to the Azure VM immediately (~8-9 min after the tag,
#      instead of ~20 waiting on windows-msvc — chromiumoxide in the tester is
#      the immovable floor of that build).
#   4. build-native (macOS x64/ARM64, Windows x64) runs in parallel and
#      attaches its archives to the published release when done. Brief window
#      where releases/latest lacks win/mac assets; installers fall back to
#      cargo install if hit mid-window.
#
# NOTE (post-cutover): the Rust dashboard/agent are NO LONGER built, shipped, or
# deployed — the C# control plane replaced them (docs/phase2-cutover-runbook.md).
# The deploy job never touches networker-dashboard; prod owns background loops
# via the C# control plane, and restarting the Rust dashboard would double-fire
# them. The Rust dashboard/agent crates remain in the tree (soak/rollback) but
# off the release train; the full-Rust snapshot is the rust-legacy-* tag.

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v0.20.1)'
        required: true

permissions:
  contents: write   # required to create releases and upload assets

env:
  # Resolve tag from either trigger type
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Deploy-critical build: linux (what prod + the bootstrap consume) ───────
  # The deploy chain gates ONLY on this + build-csharp. Windows/mac binaries are
  # download artifacts — they attach to the release asynchronously (see
  # build-native) instead of holding the deploy hostage for ~11 min of
  # windows-msvc compile (chromiumoxide in the tester is the immovable floor).
  build-linux:
    name: Build x86_64-unknown-linux-musl
    runs-on: ubuntu-latest
    env:
      TARGET: x86_64-unknown-linux-musl
      # sccache: per-compilation-unit cache that survives the Cargo.lock bump
      # every release makes (the version bump busts lockfile-keyed caches).
      CARGO_INCREMENTAL: "0"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Cache cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: release-linux-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-linux-registry-

      - name: Install musl tools (static linking)
        run: sudo apt-get update -qq && sudo apt-get install -y musl-tools

      - name: Sync lockfiles
        run: |
          cargo generate-lockfile
          cargo generate-lockfile --manifest-path benchmarks/orchestrator/Cargo.toml

      - name: Build shipped Rust binaries
        run: >
          cargo build --release --locked
          --target x86_64-unknown-linux-musl
          --features browser
          -p networker-tester -p networker-endpoint

      - name: Build orchestrator
        run: >
          cargo build --release --locked
          --target x86_64-unknown-linux-musl
          --manifest-path benchmarks/orchestrator/Cargo.toml

      - name: Package (tar.gz)
        shell: bash
        run: |
          SRC="target/${TARGET}/release"
          mkdir -p dist
          tar czf "dist/networker-tester-${TARGET}.tar.gz" -C "${SRC}" "networker-tester"
          tar czf "dist/networker-endpoint-${TARGET}.tar.gz" -C "${SRC}" "networker-endpoint"
          ORCH_SRC="benchmarks/orchestrator/target/${TARGET}/release"
          tar czf "dist/alethabench-${TARGET}.tar.gz" -C "${ORCH_SRC}" "alethabench"

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Build dashboard frontend
        run: |
          cd dashboard && npm ci --ignore-scripts && npm run build
          tar czf "../dist/dashboard-frontend.tar.gz" -C dist .

      - name: Upload build artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: dist-x86_64-unknown-linux-musl
          path: dist/

  # ── Async native builds: mac x2 + windows (do NOT gate the deploy) ─────────
  build-native:
    name: Build ${{ matrix.target }}
    needs: release   # attach to the already-published release when done
    runs-on: ${{ matrix.os }}
    env:
      CARGO_INCREMENTAL: "0"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target:  x86_64-apple-darwin
            os:      macos-latest      # cross-compile Intel from ARM64 runner
            ext:     ""
            archive: tar.gz

          - target:  aarch64-apple-darwin
            os:      macos-latest      # Apple Silicon (arm64)
            ext:     ""
            archive: tar.gz

          - target:  x86_64-pc-windows-msvc
            os:      windows-latest
            ext:     ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Cache cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      - name: Sync lockfiles
        run: |
          cargo generate-lockfile
          cargo generate-lockfile --manifest-path benchmarks/orchestrator/Cargo.toml

      # The crates that still ship as Rust: the probe core (tester) and the
      # diagnostic server (endpoint). The RUST AGENT IS RETIRED from the train
      # (v0.28.26+ bootstraps install the C# Networker.Agent, E2E-verified in
      # production; the bootstrap's legacy-asset fallback only fires for OLDER
      # release tags, which still carry the Rust asset). networker-dashboard
      # (37k LOC) stays off. The tester keeps --features browser since it's
      # installed on Windows too.
      - name: Build shipped Rust binaries
        run: >
          cargo build --release --locked
          --target ${{ matrix.target }}
          --features browser
          -p networker-tester -p networker-endpoint

      - name: Build orchestrator
        run: >
          cargo build --release --locked
          --target ${{ matrix.target }}
          --manifest-path benchmarks/orchestrator/Cargo.toml
        env:
          # Static-link the VC++ runtime on Windows so binaries work on clean
          # Windows Server images (e.g. GCP) without installing vcredist.
          RUSTFLAGS: ${{ contains(matrix.target, 'windows') && '-C target-feature=+crt-static' || '' }}

      # ── Package (Unix: .tar.gz) ──────────────────────────────────────────
      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          SRC="target/${TARGET}/release"
          mkdir -p dist

          tar czf "dist/networker-tester-${TARGET}.tar.gz" \
              -C "${SRC}" "networker-tester"
          tar czf "dist/networker-endpoint-${TARGET}.tar.gz" \
              -C "${SRC}" "networker-endpoint"

          ORCH_SRC="benchmarks/orchestrator/target/${TARGET}/release"
          tar czf "dist/alethabench-${TARGET}.tar.gz" \
              -C "${ORCH_SRC}" "alethabench"

      # ── Package (Windows: .zip) ──────────────────────────────────────────
      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $src    = "target\$target\release"
          New-Item -ItemType Directory -Force dist | Out-Null

          Compress-Archive `
              -Path "$src\networker-tester.exe" `
              -DestinationPath "dist\networker-tester-$target.zip" `
              -Force
          Compress-Archive `
              -Path "$src\networker-endpoint.exe" `
              -DestinationPath "dist\networker-endpoint-$target.zip" `
              -Force

          $orchSrc = "benchmarks\orchestrator\target\$target\release"
          Compress-Archive `
              -Path "$orchSrc\alethabench.exe" `
              -DestinationPath "dist\alethabench-$target.zip" `
              -Force

      # Attach this target's archives to the ALREADY-PUBLISHED release. The
      # deploy went out minutes ago on the linux+C# assets; win/mac downloads
      # become available here (brief window where releases/latest lacks them —
      # installers fall back to cargo install if hit mid-window).
      - name: Upload assets to release
        shell: bash
        run: gh release upload "${RELEASE_TAG}" dist/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  # ── Publish the C# control plane (self-contained linux-x64) ──────────────
  # This is the deployable that serves alethedash.com since the cutover. Built
  # on the ubuntu runner (no Windows toolchain needed) — the whole point of the
  # migration is that the control plane no longer rides the slow native matrix.
  build-csharp:
    name: Build C# control plane
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up .NET 10
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Publish ControlPlane (linux-x64, self-contained)
        run: |
          dotnet publish src/Networker.ControlPlane/Networker.ControlPlane.csproj \
            -c Release -r linux-x64 --self-contained true \
            -o publish/controlplane
          mkdir -p dist
          tar czf dist/networker-controlplane-linux-x64.tar.gz -C publish/controlplane .

      # The C# agent: what tester VMs bootstrap since v0.28.26. Single-file
      # self-contained (csproj sets PublishSingleFile + AssemblyName
      # networker-agent — drop-in for the Rust binary). Built HERE on the
      # ubuntu runner for both linux and windows — no native toolchain needed;
      # that's the point of the migration. Archive layout matches the Rust
      # convention (binary at archive root); .pdb excluded.
      - name: Publish Agent (linux-x64 + win-x64, self-contained single-file)
        run: |
          dotnet publish src/Networker.Agent/Networker.Agent.csproj \
            -c Release -r linux-x64 --self-contained true \
            -o publish/agent-linux
          tar czf dist/networker-agent-cs-linux-x64.tar.gz \
            -C publish/agent-linux networker-agent

          dotnet publish src/Networker.Agent/Networker.Agent.csproj \
            -c Release -r win-x64 --self-contained true \
            -o publish/agent-win
          (cd publish/agent-win && zip -q "$GITHUB_WORKSPACE/dist/networker-agent-cs-win-x64.zip" networker-agent.exe)

      - name: Upload C# artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: dist-csharp
          path: dist/

  # ── Create GitHub release and attach all archives ────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-csharp]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download all build artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      # Extract the release notes for this version from CHANGELOG.md.
      - name: Extract release notes
        id: notes
        run: |
          VERSION="${RELEASE_TAG#v}"
          NOTES=$(awk "
            /^## \[${VERSION}\]/ { found=1; next }
            found && /^## \[/    { exit }
            found                { print }
          " CHANGELOG.md | sed '/^[[:space:]]*$/d' | sed '1s/^[[:space:]]*//')
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          {
            echo 'notes<<RELEASE_NOTES_EOF'
            echo "$NOTES"
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        run: |
          echo "$NOTES" > /tmp/release-notes.md
          gh release create "${{ env.RELEASE_TAG }}" \
            --title "${{ env.RELEASE_TAG }}" \
            --notes-file /tmp/release-notes.md \
            dist/*
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES: ${{ steps.notes.outputs.notes }}

  # ── Deploy to the Azure VM (alethedash.com) ──────────────────────────────
  # Post-cutover deploy: swaps the C# control plane (alethedash-cs), the Rust
  # endpoint + tester, the orchestrator, and the frontend. Does NOT touch
  # networker-dashboard (retired; restarting it would double-fire the background
  # loops the C# control plane now owns). nginx already proxies /api + /ws to the
  # C# control plane on :5030 and serves the SPA static from disk.
  deploy:
    name: Deploy to alethedash.com
    needs: release
    runs-on: ubuntu-latest
    if: success()
    environment: production

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Azure Login
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy control plane, endpoint, tester, frontend
        run: |
          VERSION="${RELEASE_TAG#v}"
          echo "Deploying v${VERSION} to alethedash-vm..."

          RESULT=$(az vm run-command invoke \
            --resource-group ALETHEDASH-RG \
            --name alethedash-vm \
            --command-id RunShellScript \
            --scripts "
              set -e
              RELEASE_BASE='https://github.com/irlm/networker-tester/releases/download/v${VERSION}'

              # ── Download artifacts ──────────────────────────────────────
              echo '>> Downloading v${VERSION} artifacts...'
              curl -fsSL \"\${RELEASE_BASE}/networker-controlplane-linux-x64.tar.gz\" -o /tmp/controlplane.tar.gz
              curl -fsSL \"\${RELEASE_BASE}/networker-endpoint-x86_64-unknown-linux-musl.tar.gz\" | tar xz -C /tmp/
              curl -fsSL \"\${RELEASE_BASE}/networker-tester-x86_64-unknown-linux-musl.tar.gz\" | tar xz -C /tmp/
              curl -fsSL \"\${RELEASE_BASE}/alethabench-x86_64-unknown-linux-musl.tar.gz\" | tar xz -C /tmp/
              curl -fsSL \"\${RELEASE_BASE}/dashboard-frontend.tar.gz\" -o /tmp/dashboard-frontend.tar.gz

              # ── C# control plane (the /api + /ws backend) ───────────────
              # Idempotent env guard: DASHBOARD_PUBLIC_URL must be set or the
              # provisioning bootstrap points new tester agents at
              # ws://localhost:3000 and they never come online (found live,
              # E2E attempt 1). The deploy asserts it into the EnvironmentFile
              # so an env-file recreation can't silently regress it.
              sudo grep -q '^DASHBOARD_PUBLIC_URL=' /etc/alethedash-cs.env 2>/dev/null \
                || echo 'DASHBOARD_PUBLIC_URL=https://alethedash.com' | sudo tee -a /etc/alethedash-cs.env >/dev/null
              echo '>> Deploying C# control plane...'
              sudo systemctl stop alethedash-cs
              sudo rm -rf /opt/alethedash-cs.prevbuild
              sudo mv /opt/alethedash-cs /opt/alethedash-cs.prevbuild
              sudo mkdir -p /opt/alethedash-cs
              sudo tar xzf /tmp/controlplane.tar.gz -C /opt/alethedash-cs
              sudo find /opt/alethedash-cs -name '._*' -delete 2>/dev/null || true
              sudo chmod +x /opt/alethedash-cs/Networker.ControlPlane
              rm -f /tmp/controlplane.tar.gz

              # ── Rust endpoint (still Rust on prod) ──────────────────────
              echo '>> Deploying endpoint + tester + orchestrator...'
              sudo systemctl stop networker-endpoint 2>/dev/null || true
              for PORT in 8080 8443; do
                sudo lsof -ti:\${PORT} 2>/dev/null | xargs -r sudo kill -9 || true
              done
              sudo cp /tmp/networker-endpoint /opt/alethedash/networker-endpoint
              sudo mkdir -p /opt/alethedash/tester
              sudo cp /tmp/networker-tester /opt/alethedash/tester/networker-tester
              sudo cp /tmp/networker-tester /usr/local/bin/networker-tester
              sudo cp /tmp/alethabench /usr/local/bin/alethabench
              sudo chmod +x /opt/alethedash/networker-endpoint /opt/alethedash/tester/networker-tester \\
                /usr/local/bin/networker-tester /usr/local/bin/alethabench
              rm -f /tmp/networker-endpoint /tmp/networker-tester /tmp/alethabench

              # ── Frontend (served static by nginx) ───────────────────────
              echo '>> Installing frontend...'
              sudo mkdir -p /opt/alethedash/dashboard/dist
              sudo rm -rf /opt/alethedash/dashboard/dist/*
              sudo tar xzf /tmp/dashboard-frontend.tar.gz -C /opt/alethedash/dashboard/dist
              sudo find /opt/alethedash/dashboard/dist -name '._*' -delete 2>/dev/null || true
              sudo chmod -R a+rX /opt/alethedash/dashboard/dist
              rm -f /tmp/dashboard-frontend.tar.gz

              # ── Start services ──────────────────────────────────────────
              echo '>> Starting services...'
              sudo systemctl start networker-endpoint
              sudo systemctl start alethedash-cs

              # ── Health check (max 30s) with rollback on failure ─────────
              echo '>> Health check...'
              HEALTHY=false
              for i in \$(seq 1 30); do
                if curl -sf http://localhost:5030/api/health/ready | grep -q '\"status\":\"ready\"'; then
                  HEALTHY=true
                  echo \"C# control plane ready (attempt \${i})\"
                  break
                fi
                sleep 1
              done

              if [ \"\${HEALTHY}\" != 'true' ]; then
                echo '>> DEPLOY_FAILED: C# control plane not ready after 30s — rolling back'
                sudo journalctl -u alethedash-cs --no-pager -n 20 || true
                if [ -d /opt/alethedash-cs.prevbuild ]; then
                  sudo rm -rf /opt/alethedash-cs
                  sudo mv /opt/alethedash-cs.prevbuild /opt/alethedash-cs
                  sudo systemctl restart alethedash-cs
                  sleep 5
                  echo '>> Rollback complete'
                fi
                exit 1
              fi

              # ── Public-path check through nginx ─────────────────────────
              PUB=\$(curl -s -o /dev/null -w '%{http_code}' --max-time 8 https://alethedash.com/api/health || echo '000')
              echo \">> Public /api/health: HTTP \${PUB}\"
              if [ \"\${PUB}\" != '200' ]; then
                echo '>> DEPLOY_FAILED: public /api/health not 200'
                exit 1
              fi

              echo '>> Service status:'
              echo \"   control-plane (cs): \$(systemctl is-active alethedash-cs)\"
              echo \"   endpoint:           \$(systemctl is-active networker-endpoint)\"
              echo \">> Deploy v${VERSION} complete\"
            " \
            --query "value[0].message" -o tsv)

          echo "$RESULT"
          if echo "$RESULT" | grep -q 'DEPLOY_FAILED'; then
            echo "::error::Deploy failed — see output above"
            exit 1
          fi

      - name: Update Gist
        run: |
          jq -n --rawfile sh install.sh --rawfile ps install.ps1 \
            '{"files":{"install.sh":{"content":$sh},"install.ps1":{"content":$ps}}}' \
            > /tmp/gist_payload.json
          gh api --method PATCH /gists/37a1af64b70ef6e58ea117839407f4f9 \
            --input /tmp/gist_payload.json --jq '.updated_at' || echo "Gist update failed (non-fatal)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify deployment
        run: |
          echo "Verifying deployment..."
          sleep 5
          RESULT=$(az vm run-command invoke \
            --resource-group ALETHEDASH-RG \
            --name alethedash-vm \
            --command-id RunShellScript \
            --scripts "
              set -e
              echo '=== Service status ==='
              echo \"control-plane (cs): \$(systemctl is-active alethedash-cs)\"
              echo \"endpoint:           \$(systemctl is-active networker-endpoint)\"

              echo '=== Binary versions ==='
              echo \"tester:       \$(/opt/alethedash/tester/networker-tester --version 2>/dev/null || echo 'missing')\"
              echo \"orchestrator: \$(alethabench --version 2>/dev/null || echo 'missing')\"

              echo '=== Login round-trip (real user path through nginx -> C#) ==='
              HTTP_CODE=\$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 https://alethedash.com/api/auth/login -X POST -H 'Content-Type: application/json' -d '{\"email\":\"verify\",\"password\":\"probe\"}' 2>/dev/null || echo '000')
              echo \"Login endpoint: HTTP \${HTTP_CODE}\"
              if [ \"\${HTTP_CODE}\" != '401' ]; then
                echo 'VERIFY_FAILED: login endpoint not responding 401 to bad creds'
                exit 1
              fi

              echo 'VERIFY_OK'
            " \
            --query "value[0].message" -o tsv)

          echo "$RESULT"
          if echo "$RESULT" | grep -q 'VERIFY_FAILED'; then
            echo "::error::Deployment verification failed"
            exit 1
          fi
          echo "Deployment verified successfully"

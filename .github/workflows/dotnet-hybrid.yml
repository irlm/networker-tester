name: .NET (hybrid)

# Builds and audits the C# hybrid-migration projects under hybrid/.
# Path-filtered: only runs when the C# code (or this workflow) changes, so it
# never touches the Rust/npm pipeline. Not a required check yet — it's the
# rot-guard that keeps the hybrid scaffold green while it grows toward Phase 2.
on:
  push:
    branches: ["main", "develop"]
    paths:
      - "hybrid/**"
      - ".github/workflows/dotnet-hybrid.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "hybrid/**"
      - ".github/workflows/dotnet-hybrid.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build & audit (hybrid C#)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # TODO: pin to a SHA to match the repo's supply-chain convention once
      # the exact setup-dotnet@v4 commit is confirmed.
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore hybrid/Networker.sln

      - name: Build (Release)
        run: dotnet build hybrid/Networker.sln --configuration Release --no-restore

      # Fails the job if any project pulls a known-vulnerable package
      # (transitive included) — the security gate the code review called for.
      - name: Vulnerable package audit
        run: |
          set -euo pipefail
          out=$(dotnet list hybrid/Networker.sln package --vulnerable --include-transitive 2>&1)
          echo "$out"
          if echo "$out" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable NuGet packages detected — see log above"
            exit 1
          fi
          echo "No vulnerable packages."

      # Phase 2 adds a `dotnet test` step here once the xUnit + Testcontainers
      # suites exist (there are no test projects in the scaffold yet).

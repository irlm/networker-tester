name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # SQL tests are skipped by default; set NETWORKER_SQL_CONN in repo secrets to enable.
  # NETWORKER_SQL_CONN: "Server=localhost;Database=NetworkDiagnostics;..."

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── Format check ──────────────────────────────────────────────────────
      - name: Check formatting
        run: cargo fmt --all -- --check

      # ── Clippy ────────────────────────────────────────────────────────────
      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      # ── Unit + integration tests (no SQL) ─────────────────────────────────
      # Do NOT pass --include-ignored: tests marked #[ignore] require live
      # services (endpoint on :8080/:8443, SQL Server) that are not available
      # in the standard CI environment.
      - name: cargo test (unit tests)
        run: cargo test --workspace --lib

      - name: cargo test (endpoint unit tests)
        run: cargo test -p networker-endpoint --lib

      # Integration tests that require the endpoint in-process.
      # Each test spawns its own endpoint on random ports (TOCTOU race if
      # tests run concurrently), so we serialize them with --test-threads=1.
      - name: cargo test (integration – no SQL)
        run: cargo test --test integration -p networker-tester -- --test-threads=1

      # ── Build release ─────────────────────────────────────────────────────
      - name: Build (release)
        run: cargo build --release --workspace

  # ──────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "NetworkerTest1!"  # ephemeral CI-only container
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P NetworkerTest1! -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: network_diagnostics
          POSTGRES_USER: networker
          POSTGRES_PASSWORD: networker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-coverage-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-coverage-cargo-

      - name: Install sqlcmd
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          sudo add-apt-repository "$(curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list)"
          sudo apt-get update && sudo apt-get install -y mssql-tools18 unixodbc-dev

      - name: Create database schema
        run: |
          SQLCMD=/opt/mssql-tools18/bin/sqlcmd
          ARGS="-S localhost -U sa -P NetworkerTest1! -C"
          $SQLCMD $ARGS -i sql/01_CreateDatabase.sql
          $SQLCMD $ARGS -i sql/02_StoredProcedures.sql
          $SQLCMD $ARGS -i sql/04_AddThroughput.sql
          $SQLCMD $ARGS -i sql/05_ExtendedTcpStats.sql
          $SQLCMD $ARGS -i sql/06_ServerTiming.sql
          $SQLCMD $ARGS -i sql/07_MoreTcpStats.sql

      # Run lib tests + in-process integration tests under coverage.
      # --all-features ensures http3, db-mssql, db-postgres feature-gated paths are included.
      # --no-report accumulates raw profiles; the final `report` step merges them.
      # Integration tests are serialized (--test-threads=1) because each spawns
      # its own endpoint on random ports.
      # --include-ignored runs #[ignore] tests that have their own env-var guards
      # (SQL, PostgreSQL, DNS, curl) — they self-skip when the service is unavailable.
      - name: Collect coverage (lib tests)
        run: |
          cargo llvm-cov --no-report --workspace --all-features --lib \
            -- --include-ignored
        env:
          NETWORKER_SQL_CONN: "Server=localhost;Database=NetworkDiagnostics;User Id=sa;Password=NetworkerTest1!;TrustServerCertificate=true"
          NETWORKER_DB_URL: "postgres://networker:networker@localhost/network_diagnostics"

      - name: Collect coverage (integration tests)
        run: |
          cargo llvm-cov --no-report --workspace --all-features \
            --test integration -- --test-threads=1

      - name: Generate lcov report
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info \
            --ignore-filename-regex 'main\.rs'

      - name: Print coverage summary
        run: |
          cargo llvm-cov report --summary-only \
            --ignore-filename-regex 'main\.rs'

      - name: Generate HTML report
        run: |
          cargo llvm-cov report --html --output-dir coverage-html \
            --ignore-filename-regex 'main\.rs'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            lcov.info
            coverage-html/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  test-no-default-features:
    name: Build without default features (stub paths)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build with no default features (verifies http3/pageload3 stubs compile)
        run: cargo build -p networker-tester --no-default-features

  # ──────────────────────────────────────────────────────────────────────────
  # Optional: SQL Server integration.
  # To enable, go to Settings → Secrets and variables → Actions and add:
  #   Variable : NETWORKER_SQL_TESTS = true
  #   Secret   : NETWORKER_SQL_CONN  = <your ADO.NET connection string>
  #
  # Note: the `secrets` context is not allowed in job-level `if` conditions
  # (GitHub Actions limitation), so we use a repository variable to opt in.
  sql-integration:
    name: SQL Server integration
    runs-on: ubuntu-latest
    if: ${{ vars.NETWORKER_SQL_TESTS == 'true' }}

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "NetworkerTest1!"  # ephemeral CI-only container
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P NetworkerTest1! -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install sqlcmd
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          sudo add-apt-repository "$(curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list)"
          sudo apt-get update && sudo apt-get install -y mssql-tools18 unixodbc-dev

      - name: Create database schema
        run: |
          SQLCMD=/opt/mssql-tools18/bin/sqlcmd
          ARGS="-S localhost -U sa -P NetworkerTest1! -C"
          $SQLCMD $ARGS -i sql/01_CreateDatabase.sql
          $SQLCMD $ARGS -i sql/02_StoredProcedures.sql
          $SQLCMD $ARGS -i sql/04_AddThroughput.sql
          $SQLCMD $ARGS -i sql/05_ExtendedTcpStats.sql
          $SQLCMD $ARGS -i sql/06_ServerTiming.sql
          $SQLCMD $ARGS -i sql/07_MoreTcpStats.sql

      - name: Run SQL tests
        env:
          NETWORKER_SQL_CONN: "Server=localhost;Database=NetworkDiagnostics;User Id=sa;Password=NetworkerTest1!;TrustServerCertificate=true"
        run: cargo test --workspace --features db-mssql -- db_mssql --include-ignored

  # ──────────────────────────────────────────────────────────────────────────
  postgres-integration:
    name: PostgreSQL integration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: network_diagnostics
          POSTGRES_USER: networker
          POSTGRES_PASSWORD: networker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-pg-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-pg-cargo-

      - name: Run PostgreSQL tests
        env:
          NETWORKER_DB_URL: "postgres://networker:networker@localhost/network_diagnostics"
        run: cargo test --workspace --features db-postgres -- db_postgres --include-ignored

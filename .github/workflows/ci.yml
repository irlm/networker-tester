name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  actions: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Changed-area detection: lets C#-only / frontend-only PRs skip the Rust
  # matrix (job-level skips still satisfy branch-protection required checks,
  # unlike workflow-level `paths:` filters which leave them missing).
  #
  # PUSH EVENTS ALWAYS RUN EVERYTHING — auto-tag needs lint/test-ubuntu/
  # frontend on main, and a C#-only version bump must still release. Only
  # pull_request events skip. Detection is conservative: Rust runs unless
  # EVERY changed file matches a known non-Rust pattern.
  # ──────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.detect.outputs.rust }}
      frontend: ${{ steps.detect.outputs.frontend }}
      orchestrator: ${{ steps.detect.outputs.orchestrator }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Detect
        id: detect
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "orchestrator=true" >> "$GITHUB_OUTPUT"
            echo "push event — running everything"
            exit 0
          fi
          git fetch origin "${{ github.base_ref }}" --quiet
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          echo "changed files:"; echo "$CHANGED" | sed 's/^/  /'

          # Rust is SKIPPED only when EVERY changed file is provably non-Rust:
          # C# solution (src/), C# tests, frontend, docs, markdown, or the
          # C#-workflow file. Any other file (crates/, Cargo.*, installers,
          # scripts, this workflow, ...) keeps the full matrix. Deliberately
          # avoids `grep -qv` (selected-vs-matched semantics differ between
          # GNU and BSD grep) — capture the non-safe lines and test non-empty.
          RUST=false
          NON_SAFE=$(echo "$CHANGED" | grep -vE '^(src/|tests/Networker\.|dashboard/|docs/|\.github/workflows/dotnet\.yml$)|\.md$' || true)
          if [ -n "$NON_SAFE" ]; then
            RUST=true
            echo "rust-relevant files:"; echo "$NON_SAFE" | sed 's/^/  /'
          fi

          # Frontend runs iff dashboard/ changed (or push, handled above).
          FRONTEND=false
          if echo "$CHANGED" | grep -qE '^dashboard/'; then
            FRONTEND=true
          fi

          # Orchestrator (alethabench) is workspace-excluded, so the main lint
          # job never sees it — run its own lint/test iff its tree changed.
          ORCHESTRATOR=false
          if echo "$CHANGED" | grep -qE '^benchmarks/orchestrator/'; then
            ORCHESTRATOR=true
          fi

          echo "rust=$RUST" >> "$GITHUB_OUTPUT"
          echo "frontend=$FRONTEND" >> "$GITHUB_OUTPUT"
          echo "orchestrator=$ORCHESTRATOR" >> "$GITHUB_OUTPUT"
          echo "rust=$RUST frontend=$FRONTEND orchestrator=$ORCHESTRATOR"

  # ──────────────────────────────────────────────────────────────────────────
  # Version bump check: every PR must bump Cargo.toml version + CHANGELOG
  # ──────────────────────────────────────────────────────────────────────────
  version-check:
    name: Version bump check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Check version bump and changelog
        run: |
          git fetch origin main --quiet

          # A version bump is only required when a PR changes something that
          # actually SHIPS to users: the Rust crates, the frontend, the
          # installers, or the lockfile/manifest. PRs that touch only the C#
          # solution (src/, tests/Networker.Tests/), CI, or docs don't ride the
          # Rust release train, so forcing a bump on them is noise. Require the
          # bump iff a shipping artifact changed.
          # Dependabot PRs are dependency-only: requiring a manual version bump
          # on each would defeat the automation. Their lockfile/manifest changes
          # ride into the NEXT bumped release (release builds are --locked
          # against the merged lockfile), so exempt them here.
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            echo "✓ Dependabot PR — dependency-only; changes ride the next release. Bump not required."
            exit 0
          fi

          SHIPPING=$(git diff --name-only origin/main...HEAD \
            | grep -E '^(crates/|dashboard/|install\.sh$|install\.ps1$|Cargo\.(toml|lock)$|Directory\.Build\.props$)' || true)
          if [ -z "${SHIPPING}" ]; then
            echo "✓ PR changes no shipping artifacts (crates/frontend/installers) — Rust version bump not required."
            exit 0
          fi

          # Get version from PR branch
          PR_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')

          # Get version from base branch
          BASE_VERSION=$(git show origin/main:Cargo.toml | grep '^version' | head -1 | sed 's/.*"\(.*\)"/\1/')

          echo "Base version: ${BASE_VERSION}"
          echo "PR version:   ${PR_VERSION}"

          if [ "${PR_VERSION}" = "${BASE_VERSION}" ]; then
            echo "::error::Version not bumped. Every PR must bump the version in Cargo.toml (patch for fixes, minor for features)."
            echo ""
            echo "Current version: ${BASE_VERSION}"
            echo "Bump to at least: $(echo ${BASE_VERSION} | awk -F. '{print $1"."$2"."$3+1}')"
            echo ""
            echo "Also update: CHANGELOG.md, install.sh (INSTALLER_VERSION), install.ps1 (InstallerVersion), Directory.Build.props (<Version>)"
            exit 1
          fi

          # Check CHANGELOG has entry for new version
          if ! grep -q "## \[${PR_VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing entry for version ${PR_VERSION}. Add a ## [${PR_VERSION}] section."
            exit 1
          fi

          # Check installer versions match
          INSTALL_SH_VER=$(grep 'INSTALLER_VERSION=' install.sh | head -1 | sed 's/.*"v\(.*\)".*/\1/')
          INSTALL_PS_VER=$(grep 'InstallerVersion' install.ps1 | head -1 | sed 's/.*"v\(.*\)".*/\1/')

          if [ "${INSTALL_SH_VER}" != "${PR_VERSION}" ]; then
            echo "::error::install.sh INSTALLER_VERSION (${INSTALL_SH_VER}) doesn't match Cargo.toml (${PR_VERSION})"
            exit 1
          fi
          if [ "${INSTALL_PS_VER}" != "${PR_VERSION}" ]; then
            echo "::error::install.ps1 InstallerVersion (${INSTALL_PS_VER}) doesn't match Cargo.toml (${PR_VERSION})"
            exit 1
          fi

          # Check Directory.Build.props (the single C# version source) matches —
          # keeps the Rust and C# halves of the hybrid from drifting. Every C#
          # runtime-reported version (agent heartbeat, endpoint ServerInfo,
          # control-plane /api/health + /api/version) derives from this at
          # build time, so this one line IS the C# version.
          PROPS_VER=$(grep -o '<Version>[^<]*</Version>' Directory.Build.props | head -1 | sed 's/<[^>]*>//g')
          if [ "${PROPS_VER}" != "${PR_VERSION}" ]; then
            echo "::error::Directory.Build.props <Version> (${PROPS_VER}) doesn't match Cargo.toml (${PR_VERSION})."
            echo ""
            echo "The COMPLETE version-bump list is exactly 5 files:"
            echo "  1. Cargo.toml            (workspace version)"
            echo "  2. CHANGELOG.md          (new ## [X.Y.Z] section)"
            echo "  3. install.sh            (INSTALLER_VERSION)"
            echo "  4. install.ps1           (InstallerVersion)"
            echo "  5. Directory.Build.props (<Version> — all C# assemblies)"
            echo ""
            echo "Everything else is derived: C# assemblies, /api/health, /api/version,"
            echo "agent heartbeats, and endpoint ServerInfo all read the assembly version."
            exit 1
          fi

          echo "✓ Version bumped: ${BASE_VERSION} → ${PR_VERSION}"
          echo "✓ CHANGELOG entry found"
          echo "✓ Installer versions match"
          echo "✓ Directory.Build.props (C# assemblies) matches"

  # ──────────────────────────────────────────────────────────────────────────
  # Fast checks: format + clippy (fails early, < 2 min)
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    # C#-only / frontend-only / docs-only PRs skip the Rust matrix entirely;
    # every job that `needs: lint` (tests, coverage, sql/pg) cascades the skip.
    # Push events always run (auto-tag depends on this chain).
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: lint
          cache-on-failure: "true"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build without default features (stub paths)
        run: cargo build -p networker-tester --no-default-features

  # ──────────────────────────────────────────────────────────────────────────
  # Benchmark orchestrator (alethabench): workspace-excluded, so the lint job
  # above never touches it. Guards the clippy debt cleared in #441 (53→0).
  # Gated like the other areas: PRs run it only when benchmarks/orchestrator/**
  # changed; push events always run (changes sets orchestrator=true on push).
  # NOT a branch-protection required check — job-level skip is fine.
  # ──────────────────────────────────────────────────────────────────────────
  orchestrator:
    name: Orchestrator lint & test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.orchestrator == 'true'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: orchestrator
          workspaces: benchmarks/orchestrator
          cache-on-failure: "true"

      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path benchmarks/orchestrator/Cargo.toml --all-targets -- -D warnings

      - name: Tests
        run: cargo test --manifest-path benchmarks/orchestrator/Cargo.toml

  # ──────────────────────────────────────────────────────────────────────────
  # Ubuntu tests: full feature set including browser
  # ──────────────────────────────────────────────────────────────────────────
  test-ubuntu:
    name: Test (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: lint  # skip if lint fails

    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      # sccache caches individual compilation units keyed on their own input
      # hash, so it survives a Cargo.lock bump — only the crates that actually
      # changed recompile. This is what speeds up the COLD path (every shippable
      # PR bumps the version, busting Swatinem's lockfile-keyed target cache).
      # CARGO_INCREMENTAL=0 above is mandatory: sccache can't cache incremental.
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      # Swatinem still handles the warm path (registry + a lockfile-keyed target
      # restore); sccache layers under it for the cold path.
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: ubuntu-test
          cache-on-failure: "true"

      # Scope to the crates that still ship as Rust — the probe core (tester)
      # and the diagnostic server (endpoint). networker-dashboard/-agent were
      # replaced by the C# control plane (tested in dotnet.yml) and are pending
      # decommission, so they're off the Rust test matrix. The `lint` job still
      # clippy-builds the WHOLE workspace, a soak-time compile check for the
      # retiring crates (rollback confidence).
      - name: Tester unit tests
        run: cargo test -p networker-tester --lib

      - name: Endpoint unit tests
        run: cargo test -p networker-endpoint --lib

      - name: Integration tests
        run: cargo test --test integration -p networker-tester -- --test-threads=1

      - name: sccache stats
        if: always()
        run: sccache --show-stats

  # ──────────────────────────────────────────────────────────────────────────
  # Windows tests: skip browser feature (no Chrome, saves ~10 min compile)
  # ──────────────────────────────────────────────────────────────────────────
  test-windows:
    name: Test (windows-latest)
    runs-on: windows-latest
    needs: lint  # skip if lint fails

    # Windows is the CI long-pole. Three knobs cut it hard:
    #  - CARGO_INCREMENTAL=0: incremental compilation is dead weight in CI
    #    (cold or cache-restored builds never reuse it) and is required by
    #    sccache, which can't cache incremental artifacts.
    #  - *_DEBUG=0: skip DWARF/PDB debuginfo generation, which is a large slice
    #    of Windows codegen+link time. RUST_BACKTRACE still yields function
    #    names; only line numbers are lost — an acceptable CI trade.
    #  - sccache: per-compilation-unit cache that survives Cargo.lock bumps, so
    #    the COLD path (every shippable PR bumps the version) only recompiles
    #    the crates that actually changed rather than the whole graph.
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      # Swatinem/rust-cache caches a pruned target/ (deps only) + registry,
      # keyed on lockfile+rustc+job — the warm path when the lockfile matches.
      # sccache (above) layers under it to accelerate the cold path.
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: windows-test
          cache-on-failure: "true"

      # Build without browser feature (chromiumoxide adds ~10 min on Windows,
      # and there's no Chrome in the CI runner to test with anyway).
      # All other features (http3, db-mssql) are included via defaults.
      # Shipped Rust crates only (see the ubuntu job) — dashboard/agent are C#.
      - name: Tester unit tests (no browser)
        run: cargo test -p networker-tester --lib --no-default-features --features http3,db-mssql

      - name: Endpoint unit tests
        run: cargo test -p networker-endpoint --lib

      - name: Integration tests
        run: cargo test --test integration -p networker-tester --no-default-features --features http3 -- --test-threads=1

      - name: sccache stats
        if: always()
        run: sccache --show-stats

  # ──────────────────────────────────────────────────────────────────────────
  # Dashboard frontend
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Dashboard frontend
    runs-on: ubuntu-latest
    needs: [lint, changes]
    # Runs iff dashboard/ changed (push events set frontend=true). `!cancelled()`
    # + explicit lint-result check keeps it runnable when lint is SKIPPED
    # (frontend-only PR) while still failing fast when lint actually FAILS.
    if: ${{ !cancelled() && needs.changes.outputs.frontend == 'true' && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies (no postinstall scripts)
        run: npm ci --ignore-scripts

      - name: Audit for known vulnerabilities
        run: npm audit --audit-level=high

      - run: npm test
      - run: npm run build
      - run: npx tsc -b

  # ──────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test-ubuntu  # only run if tests pass

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "NetworkerTest1!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P NetworkerTest1! -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: network_diagnostics
          POSTGRES_USER: networker
          POSTGRES_PASSWORD: networker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@39b03b784b1fb8d2e38e4d6dcf888b991e3c5898 # cargo-llvm-cov

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: ubuntu-coverage
          cache-on-failure: "true"

      # Coverage for the shipped Rust crates (tester + endpoint); dashboard/agent
      # are C# now (their coverage lives in the dotnet suite).
      - name: Collect coverage (lib tests)
        run: |
          cargo llvm-cov --no-report -p networker-tester -p networker-endpoint --all-features --lib \
            -- --include-ignored
        env:
          NETWORKER_SQL_CONN: "Server=localhost;Database=NetworkDiagnostics;User Id=sa;Password=NetworkerTest1!;TrustServerCertificate=true"
          NETWORKER_DB_URL: "postgres://networker:networker@localhost/network_diagnostics"

      - name: Collect coverage (integration tests)
        run: |
          cargo llvm-cov --no-report -p networker-tester --all-features \
            --test integration -- --test-threads=1

      - name: Generate lcov report
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info \
            --ignore-filename-regex 'main\.rs'

      - name: Print coverage summary
        run: |
          cargo llvm-cov report --summary-only \
            --ignore-filename-regex 'main\.rs'

      - name: Generate HTML report
        run: |
          cargo llvm-cov report --html --output-dir coverage-html \
            --ignore-filename-regex 'main\.rs'

      - name: Upload coverage report
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: coverage-report
          path: |
            lcov.info
            coverage-html/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  sql-integration:
    name: SQL Server integration
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "NetworkerTest1!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P NetworkerTest1! -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: sql-integration
          cache-on-failure: "true"

      - name: Run SQL tests
        env:
          NETWORKER_SQL_CONN: "Server=localhost;Database=master;User Id=sa;Password=NetworkerTest1!;TrustServerCertificate=true"
        run: cargo test -p networker-tester --no-default-features --features db-mssql db_mssql_ -- --ignored --test-threads=1

  # ──────────────────────────────────────────────────────────────────────────
  postgres-integration:
    name: PostgreSQL integration
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: network_diagnostics
          POSTGRES_USER: networker
          POSTGRES_PASSWORD: networker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: postgres-integration
          cache-on-failure: "true"

      - name: Run PostgreSQL tests
        env:
          NETWORKER_DB_URL: "postgres://networker:networker@localhost/network_diagnostics"
        run: cargo test -p networker-tester --no-default-features --features db-postgres db_postgres_ -- --ignored --test-threads=1

  # ──────────────────────────────────────────────────────────────────────────
  # Auto-tag: create version tag on merge → triggers Release + Deploy
  # ──────────────────────────────────────────────────────────────────────────
  auto-tag:
    name: Auto-tag & deploy
    needs: [lint, test-ubuntu, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Check version and deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="v${VERSION}"
          echo "Cargo.toml version: ${VERSION}"

          if git tag -l "${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists — skipping"
          else
            echo "New version detected — tagging ${TAG}"
            git tag "${TAG}"
            git push origin "${TAG}"

            echo "Triggering Release workflow..."
            gh workflow run release.yml --field tag="${TAG}"
            echo "Release workflow triggered for ${TAG}"
          fi

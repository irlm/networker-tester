name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Fast format check (< 10s, gates everything)
  # ──────────────────────────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ──────────────────────────────────────────────────────────────────────────
  # Clippy + no-default-features check (runs in parallel with tests)
  # ──────────────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2
        with:
          shared-key: ubuntu-clippy

      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build without default features (stub paths)
        run: cargo build -p networker-tester --no-default-features

  # ──────────────────────────────────────────────────────────────────────────
  # Ubuntu tests: full feature set including browser
  # ──────────────────────────────────────────────────────────────────────────
  test-ubuntu:
    name: Test (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: fmt

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2
        with:
          shared-key: ubuntu-test

      - name: Unit tests
        run: cargo test --workspace --lib

      - name: Integration tests
        run: cargo test --test integration -p networker-tester -- --test-threads=1

  # ──────────────────────────────────────────────────────────────────────────
  # Windows tests: skip browser feature (no Chrome, saves ~10 min compile)
  # ──────────────────────────────────────────────────────────────────────────
  test-windows:
    name: Test (windows-latest)
    runs-on: windows-latest
    needs: fmt

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2
        with:
          shared-key: windows-test

      # Build without browser feature (chromiumoxide adds ~10 min on Windows,
      # and there's no Chrome in the CI runner to test with anyway).
      # All other features (http3, db-mssql) are included via defaults.
      - name: Unit tests (no browser)
        run: cargo test --workspace --lib --no-default-features --features http3,db-mssql

      - name: Integration tests
        run: cargo test --test integration -p networker-tester --no-default-features --features http3 -- --test-threads=1

  # ──────────────────────────────────────────────────────────────────────────
  # Dashboard frontend
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Dashboard frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies (no postinstall scripts)
        run: npm ci --ignore-scripts

      - name: Audit for known vulnerabilities
        run: npm audit --audit-level=high

      - run: npm test
      - run: npm run build
      - run: npx tsc -b

  # ──────────────────────────────────────────────────────────────────────────
  # Coverage (runs in parallel with test-ubuntu, subsumes its tests)
  # ──────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: fmt

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "NetworkerTest1!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P NetworkerTest1! -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: network_diagnostics
          POSTGRES_USER: networker
          POSTGRES_PASSWORD: networker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@39b03b784b1fb8d2e38e4d6dcf888b991e3c5898 # cargo-llvm-cov

      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2
        with:
          shared-key: ubuntu-coverage

      - name: Collect coverage (lib tests)
        run: |
          cargo llvm-cov --no-report --workspace --all-features --lib \
            -- --include-ignored
        env:
          NETWORKER_SQL_CONN: "Server=localhost;Database=NetworkDiagnostics;User Id=sa;Password=NetworkerTest1!;TrustServerCertificate=true"
          NETWORKER_DB_URL: "postgres://networker:networker@localhost/network_diagnostics"

      - name: Collect coverage (integration tests)
        run: |
          cargo llvm-cov --no-report --workspace --all-features \
            --test integration -- --test-threads=1

      - name: Generate lcov report
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info \
            --ignore-filename-regex 'main\.rs'

      - name: Print coverage summary
        run: |
          cargo llvm-cov report --summary-only \
            --ignore-filename-regex 'main\.rs'

      - name: Generate HTML report
        run: |
          cargo llvm-cov report --html --output-dir coverage-html \
            --ignore-filename-regex 'main\.rs'

      - name: Upload coverage report
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: coverage-report
          path: |
            lcov.info
            coverage-html/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  sql-integration:
    name: SQL Server integration
    runs-on: ubuntu-latest
    needs: fmt
    timeout-minutes: 30

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "NetworkerTest1!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P NetworkerTest1! -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2
        with:
          shared-key: ubuntu-sql

      - name: Run SQL tests
        env:
          NETWORKER_SQL_CONN: "Server=localhost;Database=master;User Id=sa;Password=NetworkerTest1!;TrustServerCertificate=true"
        run: cargo test -p networker-tester --no-default-features --features db-mssql db_mssql_ -- --ignored --test-threads=1

  # ──────────────────────────────────────────────────────────────────────────
  postgres-integration:
    name: PostgreSQL integration
    runs-on: ubuntu-latest
    needs: fmt
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: network_diagnostics
          POSTGRES_USER: networker
          POSTGRES_PASSWORD: networker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2
        with:
          shared-key: ubuntu-pg

      - name: Run PostgreSQL tests
        env:
          NETWORKER_DB_URL: "postgres://networker:networker@localhost/network_diagnostics"
        run: cargo test -p networker-tester --no-default-features --features db-postgres db_postgres_ -- --ignored --test-threads=1

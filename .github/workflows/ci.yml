name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Fast checks: format + clippy (fails early, < 2 min)
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: lint-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build without default features (stub paths)
        run: cargo build -p networker-tester --no-default-features

  # ──────────────────────────────────────────────────────────────────────────
  # Ubuntu tests: full feature set including browser
  # ──────────────────────────────────────────────────────────────────────────
  test-ubuntu:
    name: Test (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: lint  # skip if lint fails

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-test-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-test-cargo-

      - name: Unit tests
        run: cargo test --workspace --lib

      - name: Endpoint unit tests
        run: cargo test -p networker-endpoint --lib

      - name: Integration tests
        run: cargo test --test integration -p networker-tester -- --test-threads=1

  # ──────────────────────────────────────────────────────────────────────────
  # Windows tests: skip browser feature (no Chrome, saves ~10 min compile)
  # ──────────────────────────────────────────────────────────────────────────
  test-windows:
    name: Test (windows-latest)
    runs-on: windows-latest
    needs: lint  # skip if lint fails

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target
          key: windows-test-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-test-cargo-

      # Build without browser feature (chromiumoxide adds ~10 min on Windows,
      # and there's no Chrome in the CI runner to test with anyway).
      # All other features (http3, db-mssql) are included via defaults.
      - name: Unit tests (no browser)
        run: cargo test --workspace --lib --no-default-features --features http3,db-mssql

      - name: Endpoint unit tests
        run: cargo test -p networker-endpoint --lib

      - name: Integration tests
        run: cargo test --test integration -p networker-tester --no-default-features --features http3 -- --test-threads=1

  # ──────────────────────────────────────────────────────────────────────────
  # Dashboard frontend
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Dashboard frontend
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies (no postinstall scripts)
        run: npm ci --ignore-scripts

      - name: Audit for known vulnerabilities
        run: npm audit --audit-level=high

      - run: npm test
      - run: npm run build
      - run: npx tsc -b

  # ──────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test-ubuntu  # only run if tests pass

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "NetworkerTest1!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P NetworkerTest1! -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: network_diagnostics
          POSTGRES_USER: networker
          POSTGRES_PASSWORD: networker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@39b03b784b1fb8d2e38e4d6dcf888b991e3c5898 # cargo-llvm-cov

      - name: Cache cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-coverage-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-coverage-cargo-

      - name: Collect coverage (lib tests)
        run: |
          cargo llvm-cov --no-report --workspace --all-features --lib \
            -- --include-ignored
        env:
          NETWORKER_SQL_CONN: "Server=localhost;Database=NetworkDiagnostics;User Id=sa;Password=NetworkerTest1!;TrustServerCertificate=true"
          NETWORKER_DB_URL: "postgres://networker:networker@localhost/network_diagnostics"

      - name: Collect coverage (integration tests)
        run: |
          cargo llvm-cov --no-report --workspace --all-features \
            --test integration -- --test-threads=1

      - name: Generate lcov report
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info \
            --ignore-filename-regex 'main\.rs'

      - name: Print coverage summary
        run: |
          cargo llvm-cov report --summary-only \
            --ignore-filename-regex 'main\.rs'

      - name: Generate HTML report
        run: |
          cargo llvm-cov report --html --output-dir coverage-html \
            --ignore-filename-regex 'main\.rs'

      - name: Upload coverage report
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: coverage-report
          path: |
            lcov.info
            coverage-html/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  sql-integration:
    name: SQL Server integration
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "NetworkerTest1!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P NetworkerTest1! -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Run SQL tests
        env:
          NETWORKER_SQL_CONN: "Server=localhost;Database=master;User Id=sa;Password=NetworkerTest1!;TrustServerCertificate=true"
        run: cargo test -p networker-tester --no-default-features --features db-mssql db_mssql_ -- --ignored --test-threads=1

  # ──────────────────────────────────────────────────────────────────────────
  postgres-integration:
    name: PostgreSQL integration
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: network_diagnostics
          POSTGRES_USER: networker
          POSTGRES_PASSWORD: networker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-pg-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-pg-cargo-

      - name: Run PostgreSQL tests
        env:
          NETWORKER_DB_URL: "postgres://networker:networker@localhost/network_diagnostics"
        run: cargo test -p networker-tester --no-default-features --features db-postgres db_postgres_ -- --ignored --test-threads=1

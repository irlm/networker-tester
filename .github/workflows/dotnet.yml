name: .NET

# Builds and audits the C# solution (Networker.sln) that is replacing the Rust
# control plane / agent / endpoint.
#
# REQUIRED-CHECK COMPATIBLE: the pull_request trigger deliberately has NO
# `paths:` filter. A workflow-level path filter means non-matching PRs never
# create the check run at all, so a branch-protection required check would
# block those PRs forever ("Expected — waiting for status"). Instead, the
# workflow always starts on PRs and a cheap `changes` job decides whether the
# real job runs; a job skipped via `if:` still reports a (passing) check run,
# which satisfies branch protection. Same pattern as ci.yml's `changes` job.
# The push trigger keeps its path filter — push events aren't gated by
# required checks, so skipping the whole workflow there is free.
on:
  push:
    branches: ["main", "develop"]
    paths:
      - "src/**"
      - "tests/Networker.*/**"
      - "Networker.sln"
      - "Directory.Build.props"
      - ".github/workflows/dotnet.yml"
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  changes:
    name: Detect C# changes
    runs-on: ubuntu-latest
    outputs:
      csharp: ${{ steps.detect.outputs.csharp }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Detect
        id: detect
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "csharp=true" >> "$GITHUB_OUTPUT"
            echo "non-PR event — running the C# build"
            exit 0
          fi
          git fetch origin "${{ github.base_ref }}" --quiet
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          echo "changed files:"; echo "$CHANGED" | sed 's/^/  /'

          # Mirror the old workflow-level paths filter. Avoid `grep -q` exit
          # code gymnastics: capture matches and test non-empty.
          CSHARP=false
          MATCHED=$(echo "$CHANGED" | grep -E '^(src/|tests/Networker\.|Networker\.sln$|Directory\.Build\.props$|\.github/workflows/dotnet\.yml$)' || true)
          if [ -n "$MATCHED" ]; then
            CSHARP=true
            echo "C#-relevant files:"; echo "$MATCHED" | sed 's/^/  /'
          fi
          echo "csharp=$CSHARP" >> "$GITHUB_OUTPUT"
          echo "csharp=$CSHARP"

  build:
    name: Build & audit (C#)
    needs: changes
    if: needs.changes.outputs.csharp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # TODO: pin to a SHA to match the repo's supply-chain convention once
      # the exact setup-dotnet@v4 commit is confirmed.
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Networker.sln

      - name: Build (Release)
        run: dotnet build Networker.sln --configuration Release --no-restore

      # Fails the job if any project pulls a known-vulnerable package
      # (transitive included) — the security gate the code review called for.
      - name: Vulnerable package audit
        run: |
          set -euo pipefail
          # Audit only the DEPLOYABLE projects (src/). Test-project dependencies
          # (e.g. EF Core Sqlite's bundled native SQLite lib, used for in-memory
          # FK unit tests) never ship in the control-plane artifact, so a CVE in
          # a test-only transitive must not gate production. Every src/ project's
          # transitive graph is still fully scanned.
          fail=0
          for proj in src/*/*.csproj; do
            out=$(dotnet list "$proj" package --vulnerable --include-transitive 2>&1)
            echo "$out"
            if echo "$out" | grep -q "has the following vulnerable packages"; then
              echo "::error::Vulnerable NuGet packages in $proj — see log above"
              fail=1
            fi
          done
          [ "$fail" = 0 ] && echo "No vulnerable packages in shipped (src/) projects."
          exit $fail

      # Contract round-trip tests + the control-plane integration test
      # (Testcontainers + WebApplicationFactory against a real Postgres).
      - name: Test
        run: dotnet test Networker.sln --configuration Release --no-build --verbosity normal

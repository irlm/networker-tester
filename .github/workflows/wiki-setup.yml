name: Initialize Wiki

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Write and push wiki pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"
          if git clone "$WIKI_URL" /tmp/wiki 2>/dev/null; then
            echo "Wiki already initialized"
          else
            echo "Bootstrapping wiki"
            mkdir -p /tmp/wiki && cd /tmp/wiki
            git init -b master
            git remote add origin "$WIKI_URL"
            cd /
          fi
          cd /tmp/wiki
          python3 - << 'PYEOF'
import os

pages = {}

pages["Home.md"] = """# Networker Tester

A cross-platform network diagnostics suite that probes an endpoint across TCP, HTTP/1.1, HTTP/2, HTTP/3, and UDP.

## Quick Install

### macOS and Linux

```bash
curl -fsSL https://gist.githubusercontent.com/irlm/37a1af64b70ef6e58ea117839407f4f9/raw/install.sh | bash -s -- tester
curl -fsSL https://gist.githubusercontent.com/irlm/37a1af64b70ef6e58ea117839407f4f9/raw/install.sh | bash -s -- endpoint
```

### Windows (PowerShell)

```powershell
Invoke-RestMethod 'https://gist.githubusercontent.com/irlm/37a1af64b70ef6e58ea117839407f4f9/raw/install.ps1' | Invoke-Expression
```

## Quick Start

```bash
networker-endpoint
networker-tester --target https://127.0.0.1:8443/health --modes http1,http2,http3 --runs 5 --insecure --output-dir ./output
```

Open `output/report.html` in any browser.

## Wiki Pages

| Page | Contents |
|------|---------|
| [[Installation]] | curl one-liners, local install options, cloud deploy |
| [[Usage]] | All flags, all modes, output formats, config file |
| [[Protocol-Comparison]] | H1 vs H2 vs H3 -- what to run and how to read results |
| [[Cloud-Deployment]] | Azure and AWS deployment, auto-shutdown, multi-region |

## What It Measures

| Metric | Why it matters |
|--------|---------------|
| TTFB | Head-of-line blocking sensitivity |
| Throughput / Goodput | Raw vs. true end-to-end transfer rate |
| CPU | QUIC userspace encryption overhead |
| Context switches | I/O concurrency differences |
| Page-load total | Multiplexing impact across protocols |
| TCP kernel stats | RTT, cwnd, retransmits via getsockopt |
| TLS details | Version, cipher suite, ALPN, full cert chain |
| UDP RTT / jitter / loss | Raw UDP path quality |

## Two Binaries

| Binary | Role |
|--------|------|
| `networker-tester` | CLI client -- sends probes, collects metrics, writes reports |
| `networker-endpoint` | Diagnostic server -- /health, /download, /upload, /page, /browser-page |
"""

pages["Installation.md"] = """# Installation

## Quick Install

### macOS and Linux

```bash
curl -fsSL https://gist.githubusercontent.com/irlm/37a1af64b70ef6e58ea117839407f4f9/raw/install.sh | bash -s -- tester
curl -fsSL https://gist.githubusercontent.com/irlm/37a1af64b70ef6e58ea117839407f4f9/raw/install.sh | bash -s -- endpoint
curl -fsSL https://gist.githubusercontent.com/irlm/37a1af64b70ef6e58ea117839407f4f9/raw/install.sh | bash -s -- both
```

### Windows (PowerShell)

```powershell
$GistUrl = 'https://gist.githubusercontent.com/irlm/37a1af64b70ef6e58ea117839407f4f9/raw/install.ps1'
Invoke-RestMethod $GistUrl | Invoke-Expression
```

Compatible with Windows PowerShell 5.1 and PowerShell 7+.

## What the Installer Does

The installer auto-detects the fastest available install method:

| Mode | When used | Speed |
|------|-----------|-------|
| Release | gh CLI installed and authenticated | ~10 seconds |
| Source | No gh CLI; compiles from repo via cargo install | 2-10 minutes |

In source mode, the installer also offers to install missing dependencies:
- Git (via brew / apt-get / dnf / pacman / zypper / apk / winget)
- Visual C++ Build Tools on Windows (via winget)
- Rust (via rustup)

## Local Install Options

```bash
bash install.sh -y tester              # non-interactive: accept all defaults
bash install.sh --from-source tester   # force source compile
bash install.sh --skip-rust tester     # skip Rust installation check
```

## Cloud Deployment

```bash
bash install.sh --azure endpoint --region eastus --rg networker-rg --vm-size Standard_B2s
bash install.sh --aws endpoint --aws-region us-east-1 --aws-instance-type t3.small
```

See [[Cloud-Deployment]] for a full walkthrough.

## Build from Source

```bash
git clone https://github.com/irlm/networker-tester.git
cd networker-tester
cargo build --release
# Binaries: target/release/networker-tester  target/release/networker-endpoint

# With browser probe support:
cargo build --release --features browser -p networker-tester
```

## Upgrading

Re-run the same install command on every machine where the binary is used.

## Requirements

| Component | Requirement |
|-----------|------------|
| macOS | 11+ (Apple Silicon or Intel) |
| Linux | Any modern distribution (glibc or musl) |
| Windows | 10+ with PowerShell 5.1 or 7+ |
| HTTP/3 | Included by default (UDP port 8443 must not be firewalled) |
| Browser probe | Chrome or Chromium installed; build with --features browser |
| Source compile | Rust stable toolchain via rustup |
"""

pages["Usage.md"] = """# Usage

## Basic Usage

```bash
# Start the endpoint (HTTP :8080, HTTPS :8443, UDP echo :9999)
networker-endpoint

# Run a probe against it
networker-tester \\
  --target https://127.0.0.1:8443/health \\
  --modes http1,http2,http3 \\
  --runs 5 \\
  --insecure \\
  --output-dir ./output
```

Open `output/report.html` in any browser.

## All Probe Modes

| Mode | Transport | What it measures | Notes |
|------|-----------|-----------------|-------|
| `tcp` | TCP | DNS + TCP connect time only | No HTTP |
| `http1` | HTTP/1.1 | DNS, TCP, TLS, TTFB, Total | Works over plain HTTP or HTTPS |
| `http2` | HTTP/2 | DNS, TCP, TLS (ALPN h2), TTFB, Total | Requires HTTPS |
| `http3` | QUIC | QUIC handshake, TTFB, Total | UDP-based; no separate DNS/TCP phases |
| `dns` | DNS | Standalone DNS resolution with resolved IPs | No TCP |
| `tls` | TCP + TLS | Full cert chain, cipher suite, ALPN, expiry | No HTTP body |
| `udp` | UDP | RTT min/avg/p95, jitter, loss% | UDP echo server |
| `udpdownload` | UDP bulk | NWKT protocol throughput, server to client | Requires --payload-sizes |
| `udpupload` | UDP bulk | NWKT protocol throughput, client to server | Requires --payload-sizes |
| `download` | HTTP | Throughput MB/s, server to client | URL rewritten to /download?bytes=N |
| `upload` | HTTP | Throughput MB/s, client to server | URL rewritten to /upload |
| `webdownload` | HTTP | Download throughput from any URL (no rewrite) | Use for external URLs |
| `webupload` | HTTP | Upload throughput to any URL (no rewrite) | Requires --payload-sizes |
| `pageload` | HTTP/1.1 | Multi-asset page load, up to 6 parallel connections | Requires HTTPS target |
| `pageload2` | HTTP/2 | Multi-asset page load, single connection multiplexed | Requires HTTPS target |
| `pageload3` | HTTP/3 | Multi-asset page load, QUIC multiplexed | Requires HTTPS target |
| `browser` | Chromium | Real headless browser: Load/DCL/TTFB/bytes/protocols | Requires --features browser + Chrome |

`pageload` expands to pageload + pageload2 + pageload3. `browser` expands to browser1 + browser2 + browser3.

## Common Examples

```bash
# Protocol latency comparison
networker-tester --target https://127.0.0.1:8443/health --modes http1,http2,http3 --runs 20 --insecure

# Download throughput
networker-tester --target https://127.0.0.1:8443/health --modes download --payload-sizes 1m,10m,100m --runs 5 --insecure

# Upload throughput
networker-tester --target https://127.0.0.1:8443/health --modes upload --payload-sizes 1m,10m --runs 5 --insecure

# Page-load comparison
networker-tester --target https://127.0.0.1:8443/health --modes pageload,pageload2,pageload3 --page-assets 30 --page-asset-size 50k --runs 10 --insecure

# Multi-target comparison
networker-tester \\
  --target http://127.0.0.1:8080/health \\
  --target https://<cloud-ip>:8443/health \\
  --modes tcp,http1,http2,http3,udp,download --payload-sizes 1m --runs 5 --insecure --output-dir ./output
```

## Key Flags

| Flag | Default | Description |
|------|---------|-------------|
| `--target URL` | http://localhost:8080/health | URL to probe. Repeat for multi-target. |
| `--modes MODE,...` | http1,http2,udp | Comma-separated probe modes |
| `--runs N` | 3 | Repetitions per mode |
| `--concurrency N` | 1 | Concurrent requests per run |
| `--timeout N` | 30 | Per-request timeout in seconds |
| `--retries N` | 0 | Retry failed probes up to N times |
| `--payload-sizes LIST` | -- | Sizes for download/upload (e.g. 64k,1m,10m) |
| `--page-assets N` | 20 | Number of assets per page-load simulation |
| `--page-asset-size SZ` | 10k | Size of each simulated asset |
| `--insecure` | -- | Skip TLS certificate verification |
| `--output-dir PATH` | ./output | Directory for reports |
| `--html` | -- | Write HTML report |
| `--excel` | -- | Write Excel workbook (8 sheets) |
| `--json` | -- | Write structured JSON to stdout |

Size suffixes: k = KiB, m = MiB, g = GiB.

## Output Formats

### Terminal output

```
[http2] 200 HTTP/2  DNS:0.3ms TCP:0.2ms TLS:3.9ms TTFB:0.4ms Total:4.6ms CPU:0.9ms CSW:3v/0i
[http3] 200 HTTP/3  QUIC:1.5ms TTFB:0.4ms Total:2.1ms CPU:2.4ms CSW:4v/1i
```

HTTP/3 shows QUIC:Xms instead of separate DNS/TCP/TLS phases.

### HTML report (--html)

Sections: Run Summary, Timing Breakdown, Protocol Comparison, Throughput Results,
All Attempts, TCP Stats, TLS Details, UDP Statistics.

For multiple targets: Cross-Target Comparison table with % delta vs baseline.

### Excel workbook (--excel)

Eight worksheets: Summary, HTTP Timings, TCP Stats, TLS Details, UDP Stats,
Throughput, Server Timing, Errors.

## Configuration File

```json
{
  "targets": ["http://127.0.0.1:8080/health", "https://remote:8443/health"],
  "modes": ["http1", "http2", "http3", "udp"],
  "runs": 5,
  "payload_sizes": ["1m"],
  "insecure": true,
  "output_dir": "./output"
}
```

```bash
networker-tester --config my-config.json
networker-tester --config my-config.json --runs 10
```

## Endpoint Routes

| Route | Method | Description |
|-------|--------|-------------|
| `/` | GET | HTML landing page with server info |
| `/health` | GET | {"status":"ok"} with version header |
| `/download?bytes=N` | GET | Returns N bytes with timing headers |
| `/upload` | POST | Drains body, returns byte count |
| `/page` | GET | JSON manifest for pageload probes |
| `/browser-page` | GET | HTML page with img tags for browser probes |
| `/echo` | POST | Echoes request body |
| `/delay?ms=N` | GET | Sleeps N ms then responds |
"""

pages["Protocol-Comparison.md"] = """# Protocol Comparison: H1 vs H2 vs H3

## Background

| Aspect | HTTP/1.1 | HTTP/2 | HTTP/3 |
|--------|----------|--------|--------|
| Transport | TCP | TCP | QUIC (UDP) |
| Multiplexing | None | Full (streams over one TCP conn) | Full (streams over one QUIC conn) |
| Head-of-line blocking | TCP + HTTP level | TCP level only | None |
| TLS | Kernel-offloaded | Kernel-offloaded | Userspace (per-datagram) |
| Connections for page loads | Up to 6 per host | 1 | 1 |
| Handshake | DNS + TCP + TLS | DNS + TCP + TLS | QUIC combined (shown as QUIC:Xms) |

## Test 1: Request Latency (tiny payload)

```bash
networker-tester --target https://127.0.0.1:8443/health --modes http1,http2,http3 --runs 20 --insecure
```

Expected patterns:
- CPU for HTTP/3 is 2-5x higher -- QUIC encryption runs in userspace
- TTFB is similar on loopback; differences appear on real network links
- HTTP/3 shows QUIC:Xms (no separate DNS/TCP/TLS -- QUIC combines all three)

## Test 2: Download Throughput

```bash
networker-tester --target https://127.0.0.1:8443/health --modes download --payload-sizes 1m,10m,100m --runs 5 --insecure
```

- **Throughput** = payload_bytes / (total_duration_ms - ttfb_ms) -- body transfer only
- **Goodput** = payload_bytes / (dns + tcp + tls + total_duration_ms) -- includes setup
- Goodput gap is larger for H3 (longer QUIC handshake hurts small transfers)

## Test 3: Page-Load Comparison (the key test)

Simulates a browser fetching an HTML page with N parallel assets.

```bash
networker-tester \\
  --target https://127.0.0.1:8443/health \\
  --modes pageload,pageload2,pageload3 \\
  --page-assets 30 --page-asset-size 50k \\
  --runs 10 --insecure --output-dir ./output
```

Expected results:

| Metric | H1.1 (pageload) | H2 (pageload2) | H3 (pageload3) |
|--------|-----------------|-----------------|-----------------|
| total_ms | Highest (HOL + 6 conns) | Lower (full multiplex) | Similar to H2 |
| connections_opened | Up to 6 | 1 | 1 |
| tls_overhead_ratio | Higher (6 handshakes) | Lower (1 handshake) | Similar to H2 |
| cpu_time_ms | Lowest | Moderate | Highest (QUIC userspace) |

## Test 4: Asset Count Sweep

Find the crossover where H2 multiplexing beats H1.1 connection pools (~6-10 assets):

```bash
for N in 5 10 20 40 80; do
  networker-tester \\
    --target https://127.0.0.1:8443/health \\
    --modes pageload,pageload2 \\
    --page-assets $N --page-asset-size 10k \\
    --runs 5 --insecure
done
```

## Test 5: Add Real Browser Metrics

Requires Chrome/Chromium installed and built with --features browser:

```bash
cargo build --release --features browser -p networker-tester
networker-tester \\
  --target https://127.0.0.1:8443/health \\
  --modes pageload,pageload2,pageload3,browser \\
  --page-assets 30 --page-asset-size 50k \\
  --runs 10 --insecure --output-dir ./output
```

Browser probe captures: Load time, DOMContentLoaded, TTFB, resource count, bytes transferred, per-protocol resource counts.

## Interpreting Results

| What to compare | What it tells you |
|-----------------|-------------------|
| pageload vs pageload2 total_ms | Benefit of H2 multiplexing over H1.1 connection pools |
| pageload2 vs pageload3 total_ms | QUIC advantage on lossy or high-latency links |
| connections_opened in pageload | Should be <= 6; more = more TLS handshake cost |
| tls_overhead_ratio in pageload | TLS as % of total -- high ratio means connection reuse helps |
| cpu_time_ms across protocols | H3 always highest due to QUIC userspace encryption |
| browser Load vs pageload total | Gap = browser render/parse/JS overhead |

## CPU and Context Switch Interpretation

### CPU (cpu_time_ms)

- http1: lowest -- kernel handles TCP; one TLS record layer
- http2: slightly higher -- HPACK header compression
- http3: 2-5x higher -- QUIC encrypts every UDP packet in userspace

### Context switches (CSW)

- Voluntary (v): process yielded CPU waiting for I/O -- higher for async-heavy protocols
- Involuntary (i): kernel preempted the process -- higher under CPU pressure
- Server CSW (sCSW) is reported via Server-Timing: csw-v;dur=N, csw-i;dur=N
"""

pages["Cloud-Deployment.md"] = """# Cloud Deployment

Deploy `networker-endpoint` to a cloud VM for real-world latency and throughput measurements.

## Overview

The installer handles the full provisioning flow:
1. Creates VM (or reuses an existing resource group)
2. Opens required firewall ports (TCP 8080, 8443; UDP 8443)
3. Compiles or downloads the binary
4. Starts the server
5. Runs a health check and writes `networker-cloud.json` with the VM IP

## Azure Deployment

### Prerequisites

```bash
az login
```

### Deploy the endpoint

```bash
bash install.sh --azure endpoint
bash install.sh --azure endpoint --region eastus --rg networker-rg --vm networker-endpoint-vm --vm-size Standard_B2s
```

| Flag | Default | Description |
|------|---------|-------------|
| `--region REGION` | eastus | Azure region |
| `--rg NAME` | networker-rg-endpoint | Resource group name |
| `--vm NAME` | auto-generated | VM name (smart naming: nwk-ep-lnx-b1s, collision detection) |
| `--vm-size SIZE` | Standard_B2s | Azure VM size |

### Local vs Azure comparison

```bash
networker-endpoint
networker-tester \\
  --target http://127.0.0.1:8080/health \\
  --target https://<azure-vm-ip>:8443/health \\
  --modes tcp,http1,http2,http3,udp,download,pageload,pageload2,pageload3 \\
  --payload-sizes 1m --runs 5 --insecure --output-dir ./output
```

## AWS Deployment

### Prerequisites

```bash
aws configure
```

### Deploy the endpoint

```bash
bash install.sh --aws endpoint
bash install.sh --aws endpoint --aws-region us-east-1 --aws-instance-type t3.small --aws-endpoint-name networker-endpoint
```

| Flag | Default | Description |
|------|---------|-------------|
| `--aws-region REGION` | us-east-1 | AWS region |
| `--aws-instance-type TYPE` | t3.small | EC2 instance type |
| `--aws-endpoint-name NAME` | networker-endpoint | EC2 Name tag |

## Auto-Shutdown

The installer configures automatic VM shutdown at 11 PM EST by default.

### Azure

```bash
az vm auto-shutdown --resource-group networker-rg --name networker-endpoint-vm --time 2300 --timezone "Eastern Standard Time"
az vm auto-shutdown --resource-group networker-rg --name networker-endpoint-vm --off
```

### AWS

The installer adds a cron job on the instance. To modify it, SSH in and edit the crontab:

```bash
crontab -e
# Change shutdown time (UTC):
# 0 22 * * * /sbin/shutdown -h now
```

## Multi-Region Comparison

### 1. Deploy endpoints in multiple regions

```bash
bash install.sh --azure endpoint --region eastus        --rg networker-rg-eastus
bash install.sh --azure endpoint --region uksouth       --rg networker-rg-uksouth
bash install.sh --azure endpoint --region southeastasia --rg networker-rg-sea
```

### 2. Run a multi-target comparison

```bash
networker-tester \\
  --target http://127.0.0.1:8080/health \\
  --target https://<eastus-ip>:8443/health \\
  --target https://<uksouth-ip>:8443/health \\
  --target https://<sea-ip>:8443/health \\
  --modes tcp,http1,http2,http3,download --payload-sizes 1m --runs 10 --insecure --output-dir ./output
```

### 3. What to look for

| Metric | What it tells you |
|--------|-------------------|
| tcp connect_ms delta | Raw TCP round-trip per region |
| http1/http2/http3 total_ms delta | Protocol overhead on top of RTT |
| download throughput delta | Available bandwidth per region |
| pageload total_ms delta | Real page-load impact at WAN latency |

Typical patterns:
- WAN HTTP total_ms is 5-50x higher than loopback
- H3 may show a larger delta than H2 on high-latency links (QUIC handshake cost)
- Download throughput is limited by the uplink/downlink of both sides

## Troubleshooting

| Issue | Cause | Fix |
|-------|-------|-----|
| Health check times out | Firewall propagation delay | Wait 30-60 s and retry |
| HTTP/3 not working | UDP 8443 blocked | Check NSG / security group rules |
| SSH key mismatch | Wrong SSH key | Set NETWORKER_SSH_KEY env var |
| No pre-built binary | Source-build fallback triggered | Normal; installer compiles on VM (~5 min) |
"""

os.chdir('/tmp/wiki')
for filename, content in pages.items():
    with open(filename, 'w') as f:
        f.write(content)
    print(f"Written: {filename}")
PYEOF
          ls -la /tmp/wiki/
          git add .
          git status
          git commit -m "Add wiki pages: Home, Installation, Usage, Protocol-Comparison, Cloud-Deployment" || echo "Nothing to commit"
          git push origin master --force || git push origin HEAD:master --force

      - name: Delete this workflow file
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          SHA=$(gh api "/repos/$REPO/contents/.github/workflows/wiki-setup.yml" --jq '.sha' 2>/dev/null || echo "")
          if [ -n "$SHA" ]; then
            gh api --method DELETE "/repos/$REPO/contents/.github/workflows/wiki-setup.yml" \
              -f message="Remove one-time wiki setup workflow" \
              -f sha="$SHA" && echo "Workflow self-deleted" || echo "Could not self-delete"
          fi

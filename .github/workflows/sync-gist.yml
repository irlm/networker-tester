name: Sync install scripts to Gist

# Keeps the public Gist (used as the curl/irm install URL) in sync with the
# install.sh and install.ps1 in this private repo.  The Gist must be public
# so that users on any machine can curl/irm it without authentication.
#
# Required secret: GIST_TOKEN
#   A GitHub Personal Access Token (classic) with the `gist` scope.
#   Add it at: Settings → Secrets and variables → Actions → New repository secret

on:
  push:
    branches: [main]
    paths:
      - install.sh
      - install.ps1

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Gist
        env:
          GIST_ID: 37a1af64b70ef6e58ea117839407f4f9
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          sh_content=$(cat install.sh)
          ps1_content=$(cat install.ps1)
          payload=$(jq -n \
            --arg sh  "$sh_content" \
            --arg ps1 "$ps1_content" \
            '{"files": {"install.sh": {"content": $sh}, "install.ps1": {"content": $ps1}}}')
          curl -fsSL \
            -X PATCH \
            -H "Authorization: token ${GIST_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "https://api.github.com/gists/${GIST_ID}" \
            | jq -r '.updated_at // "no updated_at in response"'
          echo "Gist updated."

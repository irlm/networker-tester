# nginx WebSocket access-log redaction — install to /etc/nginx/conf.d/
#
# WHY: agents authenticate at /ws/agent?key=<api_key> and browsers/testers at
# /ws/dashboard?access_token=<jwt> / /ws/testers?token=<jwt>. The credential
# rides in the query string (a wire-compat carryover from the retired Rust
# dashboard — WebSocket clients can't set an Authorization header the way the
# handshake here is written). nginx's default `combined` log_format logs
# $request, i.e. the FULL request line including the query string, so the live
# credential would be written to /var/log/nginx/access.log in cleartext on every
# connect. Flagged P1 by the 2026-07 secrets/websec audit
# (docs/analysis/websec-audit-2026-07.md, docs/analysis/secrets-audit-2026-07.md).
#
# WHAT: this format is the standard `combined` layout but logs $uri (the
# normalized request PATH, without the query string) instead of $request, so the
# secret never reaches the log. IP / timestamp / status / user-agent — the
# brute-force + audit signal — are all preserved.
#
# This file only DEFINES the format. It takes effect only where a location opts
# in with `access_log /var/log/nginx/access.log ws_redacted;` — see
# docs/ops-nginx-ws-redaction.md for the per-/ws-location line and the apply /
# verify / rollback steps. conf.d is included before sites-enabled in nginx.conf,
# so the format is defined before the /ws blocks reference it.
#
# INTERIM: the definitive fix moves the credential out of the query string into a
# header (Sec-WebSocket-Protocol for browsers, Authorization for the agents) at
# the Rust-agent decommission, after which this redaction is no longer needed.

log_format ws_redacted '$remote_addr - $remote_user [$time_local] '
                       '"$request_method $uri $server_protocol" $status '
                       '$body_bytes_sent "$http_referer" "$http_user_agent"';
